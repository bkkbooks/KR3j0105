body:
  text: 石林燕語卷十宋葉夢得撰宇文紹奕考異蘇魏公為宰相因爭賈易復官事持之未決御史楊畏論蘇故稽詔令蘇即上馬乞退請致仕吕微仲語蘇可見上辨之何遽去蘇曰宰相一有人言便為不當物望豈可更辨曲直宣仁力留之不從乃罷以為集禧觀使自熙寧以來宰相未有去位而留京師者蓋異恩也紹聖初治元祐黨人凡嘗為宰執者無不坐貶惟子容一人獨免熙寧以前臺官例少貶間有責補外者多是平出未幾復召還故臺吏事去官每加謹為其治行及區處家事無不盡力近嵗臺官進退既速貶責復還者無幾然吏習成風猶不敢懈開封官治事略如外州督察按舉必繩以法往往加以笞責故府官罷吏率掉臂不顧至或靳侮之時稱孝順御史臺忤逆開封府范魯公與王溥魏仁浦同日罷相為一制其辭曰或病告未寧或勤勞可眷時南郊畢質溥皆再表求退仁浦以疾在告乞骸骨故云王冀公罷參知政事真宗眷意猶未衰特置資政殿學士命之時冦萊公欲抑之乃定班翰林學士之下冀公訴以為無罪而反降故復命為大學士班樞密副使之下自是非嘗任宰執者不除元豐間韓持國陳薦非執政而除蓋宫僚之異恩也王荆公在金陵神宗嘗遣內侍凌文炳傳宣撫問因賜金二百荆公望闕拜受跪已語文炳曰安石間居無所用即庭下發封顧使臣曰送蔣山常住置田祝延聖夀王元之素不喜釋氏始為知制誥名振一時丁晉公孫何皆遊門下元之亦極力延譽由是衆多側目有偽為元之請汰釋氏疏及何無佛論者未幾有商洛之貶歐陽文忠公丁母憂服除召還公嘗疾士大夫交通權近至是亦有偽公乞罷斥宦官章傳播者遂出知同州會有辨其誣遂復留紹聖間常朝起居章子厚押班一日忽少一拜遽升殿在廷侍從初不記省見丞相進即止蔡魯公時為翰林學士承旨獨徐足一拜而退當時以為得體大觀間蔡魯公在告張賔老押班忽多一拜豫時為學士劉德初薛肇明皆為尚書班相近豫覺其誤即語二人二人曰非誤當拜余不免亦從之閣門彈失儀皆放罪子厚語人是日邊奏有蕃官威明阿密者當進呈偶忘思之遂忘拜數而豫雖覺其誤然初亦不甚著意記拜數既聞二人之言從而亦疑乃知朝謁當一意盡恭不可雜以他念也李孝夀知開封府有舉子為僕所陵忿甚亟縛之作狀欲送府會為同舍勸解久之氣亦平因釋去自取其狀戲學孝夀押字判曰不勘案決臀杖二十其僕怨之翌日即竊狀走府曰秀才日學知府判狀私決人孝夀怒即令追之既至具陳所以孝夀翻然謂僕曰如此秀才所判正與我同真不用勘案命吏就讀其狀如數決之是嵗舉子會省試於都下數千人凡僕聞之皆畏戢無敢肆者當時亦稱其敏真宗幸澶淵丁晉公以鄆齊濮安撫使知鄆州敵既入塞河北居民驚奔渡河欲避於京東者日數千人舟人邀阻不時濟丁聞之亟取獄中死囚數人以為舟人悉斬於河上於是曉夕並渡不三日皆盡既渡復擇民之少壯者分畫地分各使執旗幟鳴金鼓於河上夜則傳更點申號令連數百里敵人莫測訖師退境內晏然張乖崖再治蜀一日問其客李畋外間百姓頗相信服否畋言相公初鎮民已服矣何待今日乖崖曰不然人情難服前未今次或恐然只這信字五年方做得成劉祕監几字伯夀磊落有氣節善飲酒洞曉音律知保州方春大集賔客飲至夜分忽告外有卒謀為變者几不問益令折花勸坐客盡戴益酒行密令人分捕有頃皆擒至几遂極飲達旦人皆服之號戴花劉使几本進士元豐間換文資以中大夫致仕居洛中平時挾女奴五七輩載酒持被囊往來嵩少間初不為定所遇得意處即解囊藉地傾壺引滿旋度新聲自為辭使女奴共歌之醉則就卧不去雖暴露不顧也嘗召至京師議大樂旦以朝服趨局暮則易布裘徒步市廛間或娼優所集處率以為常神宗亦不之責其自度曲有戴花正音集行於世人少有得其聲者宋守約為殿帥自入夏日輪軍校十數輩捕蟬不使得聞聲有鳴於前者皆重笞之人頗不堪故言守約惡聞蟬聲神宗一日以問守約曰然上以為過守約曰臣豈不知此非理但軍中以號令為先臣承平總兵殿陛無所信其號令故寓以捕蟬耳蟬鳴固難禁而臣能使必去若陛下誤令守一障臣庶幾或可使人上以為然包孝肅為中丞張安道為三司使攻罷之既又自成都召宋子京孝肅復言其在蜀燕飲過度事改知鄭州已而乃除孝肅遂就命歐陽文忠時為翰林學士因疏孝肅攻二人以為不可而已取之不無蹊田奪牛之意孝肅雖嘗引避而終不辭元祐間蘇子由為中丞攻罷許沖元繼除右丞御史安鼎亦以為言二人固非有意者然歐陽公之言亦足以厚士風也王繼忠真宗藩邸舊臣後為髙陽關部轄咸平中與契丹戰沒契丹得之不殺喜其辨慧稍見親用朝廷不知其尚存也及景德入寇繼忠從行乃使通奏先導欲和之意朝廷始知其不死卒因其説以成澶淵之盟繼忠是時於兩間用力甚多故契丹不疑真宗亦録其妻子嵗時待之甚厚後改姓耶律封王卒於契丹而子孫在中朝官者亦甚衆至今京師號陷蕃王太尉家考異王繼忠為定州路副都署咸平六年戰殁此云為髙陽關部轄非也陳密學襄鄭祭酒穆與陳烈周希孟皆福州人以鄉行稱閩人謂之四先生烈尤為蔡君謨所知嘗與歐陽文忠公共薦於朝由是益知名然烈行怪多偽蔡君謨母死烈往弔自其家匍匐而進人問之曰此詩所謂凡民有喪匍匐救之者也其所為類如此後為妻訟其不睦事為監司所按詔置獄劾治司馬溫公為諫官上疏救之曰烈既嘗為近臣所推必無甚過若遽摧辱恐沮傷山林處士之氣然亦竟坐罪杜祁公居官清介每請俸必過初五家人有前期誤請者公怒即以付有司劾治尹師魯公所知也余在潁川士人家嘗見師魯得罪後謝公書親引此事云以某自視雖若無愧以公觀之則安得為無罪師魯蓋坐擅貸官錢為部吏償債當時有惡之者遂論以贓云吕丞相微仲性沉厚剛果遇事無所回屈身幹長大而方望之偉然初相蘇子瞻草麻云果毅而達兼孔門三子之風直大以方得坤爻六二之動蓋以戲之微仲終身以為恨言固不可不慎考異直方大美之至矣何必終身為恨乎果毅當作果藝仁宗山陵韓魏公為使時國用窘匱而一用乾興故事或以為過蘇明允為編禮官以書責公至引宋華元厚葬事以為不臣魏公得之矍然已乃斂容起謝曰某無狀敢不奉教然華元事莫未至是否聞者無不服公大度能受意外之言也余見大父時家居及燕見賔客率多頂帽而繫勒帛猶未甚服背子帽下戴小冠簮以帛作橫幅約髮號額子處室中則去帽見冠簮或用頭巾也古者士皆冠帽乃冠之遺製頭巾賤者不冠之服耳勒帛亦有垂紳之意雖施之外不為簡背子本半臂武士服何取於禮乎或云勒帛不便於搢笏故稍易背子然須用上襟掖下與背皆垂帶余大觀間見宰執接堂吏押文書猶冠帽用背子今亦廢矣而背子又引為長袖與半臂製亦不同頭裹賤者巾衣武士服而習俗之久不以為異古禮之廢大抵類此也劉丞相摯家法儉素閨門雍睦凡冠巾衣服制度自其先世以來常守一法不隨時增損故承平時其子弟雜處士大夫間望而知其為劉氏也數十年來衣冠詭異雖故老達官亦不免從俗與市井喧浮略同而不以為非舊鳯翔郿縣出縚以緊細如箸者為貴近嵗衣道服者縚以大為美圍率三四寸長二丈餘重復腰間至五七返以真茸為之一縚有直十餘千者此何理也趙清獻公每夜常燒天香必擎爐默告若有所祕祝者數客有疑而問公公曰無他吾自少晝日所為夜必裒斂奏知上帝已而復曰蒼蒼眇冥吾一矢區區之誠安知必能盡達姑亦自防檢使不可奏者知有所畏不敢為耳有周竦者嘗為公門客為余言之杜祁公罷相居南京無宅假驛舍居之數年訖公薨卒不遷亦不營生事止食其俸而已然閭里吉凶慶弔與親識之道南京者相與燕勞問遺之禮未嘗廢公薨夫人相里氏以絶俸不能自給始盡出其篋中所有易房服錢二千公本遺腹子其母後改適河陽人公為前母子不容因逃河陽依其母傭書於濟源富人相里氏一見竒之遂妻以女云范文正公四子長曰純佑有竒才方公始為西帥時已能佐公治軍早死其次即忠宣夷叟德孺也嘗為人言純仁得吾之忠純禮得吾之正純粹得吾之材忠宣以身任國世固知之夷叟簡默寡言笑雖家居獨坐一室或終日不出德孺繼公帥西方為名將卒如其言云前輩多知人或云亦各有術但不言爾夏文莊公知蘄州龎莊敏公為司法嘗得時疾在告方數日忽吏報莊敏死矣文莊大駭曰此人當為宰相安得便死吏言其家已發哀文莊曰不然即自往見取燭視其面曰未合死召醫語之曰此陽證傷寒汝等不善治誤爾亟取承氣湯灌之有頃莊敏果蘇自此遂無恙世多傳以為異張康節公忭田樞密況出處雖不同其微時皆文莊所薦也范文正公用人多取氣節闊略細故如孫威敏滕達道之徒皆深所厚者為帥府辟置多謫籍未牽敘人或以問公公曰人之有才能無瑕纇者自應用於宰相惟實有可用不幸陷於過失者不因事起之則遂為廢人矣世咸多公此意凡軍伍以雜犯降黜者例皆改刺龍騎指揮故時當權者每憚公廢法建請難於盡從因戲之為龍騎指揮使云王右丞正仲口吃遇奏對則如流歐陽文忠近視常時讀書甚艱惟使人讀而聽之在政府數年每進文字亦如常人不少異貴人真自有相也余為郎官時嘗遇視朔過殿有御史為巡使者法當獨立於殿廷之南北向以察百官失儀其人久在學校素矜慎始引就位輒無故仆地既掖而起又仆如是者三上遙望以為疾作亟命衛士數人扶出逮至殿門步行如常問之曰自不能曉但覺足弱耳其人官後亦不顯亦其相然也崇寧中蔡魯公當國士人有陳獻利害者末云伏望間燕特賜省覽有得之欲讒公者密摘以白上曰清間之燕非人臣所得稱而魯公受之不以聞魯公引禮孔子間居仲尼燕居自辨乃得釋司馬溫公自少稱迂叟著迂書四十一篇韓魏公晚號安陽戅叟文潞公號伊叟歐陽文忠公號六一居士以琴棋書酒集古碑為五而自當其一嘗著六一居士傳蘇子瞻謫黃州號東坡居士東坡其所居地也晚又號老泉山人以眉山先塋有老翁泉故云子由自嶺外歸許下號潁濵遺老亦自為傳家有遺老齋蓋元祐人至子由存者無幾矣王禹玉作龎潁公神道碑其家送潤筆金帛外參以古書名畫三十種杜荀鶴及第時試卷亦是一種章郇公髙祖母練氏其夫均為王審知偏將領軍守西巖一日盜至不能敵遣二親校請兵於審知後期不至將斬之練氏為請不得即密取奩中金遺二校急使逃去二校奔南唐會王氏國亂李景即遣兵攻福州時均已卒矣二校聞練氏在亟遣人賫金帛招之使出曰吾翌日且屠此城若不出即併及矣練氏返金帛不納曰為我謝將軍誠不忘前日之意幸退兵使吾城降吾與此城人可俱全不然願與皆屠不忍獨生也再三請不已二將感其言遂許城降均十五子五為練氏出郇公與申公皆其後也丁晉公初治第於車營務街楊景宗時為役兵為之運土景宗章惠太后弟也後以太后得官晉公謫即以其第賜之性凶悍使酒挾太后晚尤驕肆好以滑槌毆人時號楊滑槌故今猶以名其宅云朝文元逈嘗云陸象先言天下本無事祇是庸人擾之始為煩耳吾亦曰心間本無事率由妄念擾之始為煩耳朝文元公天資純至年過四十登第始娶前此未嘗知世事也初學道於劉海蟾得煉氣服形之法後學釋氏常以二教相參終身力行之既老居昭德坊里第又於前為道院名其所居堂曰凝寂燕坐蕭然雖子弟見有時晚年耳中聞聲自言如樂中簧始隱隱如雷漸浩浩如潮或如行軒百子鈴或如風蟬曵緒每五鼓後起坐聞之尤清徹以為學道靈感之驗今人靜極類亦有聞此聲者豈朝固自不同耶或云晚嘗自見其形在前既久漸小八十後每在眉睫之間此尤異也王荆公性不善緣飾經嵗不洗沐衣服雖敝亦不浣濯與吳沖卿同為羣牧判官韓持國在館中三數人尤厚善無日不過從因相約每一兩月即相率洗沐定力院家各更出新衣為荆公畨號拆洗王介甫云出浴見新衣輒服之亦不問所從來也曽子先持母喪過金陵公往弔之登舟顧所服紅帶適一虞候挾笏在旁公顧之即解易其皂帶入弔既出復易之而去文潞公父為白波輦運潞公時尚少一日嘗以事忤其父欲撻之潞公密逃去張靖父為輦運司軍曹司知其所在迎歸使與靖同處其父求潞公月餘不得極悲思之乃徐出見因使與靖同學後因登第潞公相時擢靖為直龍圖閣靖有吏幹翰林學士張閣其子也蔡魯公喜接賔客終日酬酢不倦家居遇賔客少間則必至子弟學舍與其門客從容燕笑蔡元度稟氣弱畏見賔客每不得已一再見則以啜茶多退必嘔吐嘗云家兄一日無客則病某一日接客則病米芾詼譎好竒在真州嘗謁蔡太保攸於舟中攸出所藏右軍王略帖示之芾驚歎求以他畫換易攸意以為難芾曰公若不見從某不復生即投此江死矣因大呼據船舷欲墜攸遽與之知無為軍初入州廨見立石頗竒喜曰此足以當吾拜遂命左右取袍笏拜之每呼曰石文言事者聞而論之朝廷亦傳以為笑考異據米芾所記王略帖八十二字乃是以錢十五萬得之而謝安帖六十五字則得於蔡太保也薛文惠公居正父仁謙世居今京昭德坊後唐莊宗入汴仁謙出避其第為唐六宅使李賔所據賔家多資嘗藏金珠價數十萬第中會以罪謫不及取仁謙後復歸欲入居或告以所藏者仁謙曰吾敢盜人之所有乎盡召賔近屬使發取然後入文惠為相時正居此宅宜有是也仁謙仕周亦為太子賔客致仕云宋元憲公嘗問蘇魏公徐鍇與鉉學問該洽略相同而世獨稱鉉何也魏公言鍇仕江南早死鉉得歸本朝士大夫從其學者衆故得大其名爾元憲兄弟好論小學得鍇所作説文繫傳而愛之每欲為發明得蘇論喜曰二徐未易分優劣要以是别之異時修史者不可易也余頃從蘇借繫傳蘇語及此亦自志於繫傳之末曹瑋帥秦州當趙德明叛邊庭駭動瑋嘗與客對棋軍吏報有叛卒投德明者瑋奕如常至於再三徐顧吏曰此吾遣使行後勿復言德明聞殺投者卒遂不復叛元豐間劉舜卿知雄州敵冦夜竊其關鎖去吏密以聞舜卿亦不問但使易其門鍵大之後數日敵牒送盜者併以鎖至舜卿曰吾未嘗亡鎖命加於門則大數寸併盜還之敵大慚沮盜者亦得罪舜卿近世名臣也石林燕語卷十
