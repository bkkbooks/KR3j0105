body:
  text: 石林燕語卷五宋葉夢得撰宇文紹奕考異祥符中楊文公為翰林學士以久疾初愈入直乞權免十日起居詔免半月仍令出宿私第文公具表謝真宗以詩批其末賜之云承明近侍究儒元苦學勞心疾已痊善保興居調飲食副豫前席待多賢祖宗眷禮儒臣之盛古未有也考異文公疾在假詔遣使挾醫視之文公上表謝真宗以詩批其末賜之其權免起居又別是一節也見㑹要而金坡遺事云文公被疾既赴朝參具狀稱謝御筆於狀尾批七言二韻詩賜之兩說不同然要非因權免起居賜詩也太祖初命曺武惠彬討江南潘美副之將行賜燕於講武殿酒三行彬等起跪於榻前乞面受處分上懷中出一實封文字付彬曰處分在其間自潘美以下有罪但開此徑斬之不須奏禀二臣股栗而退迄江南平無一犯律者比還復賜燕講武殿酒三行二臣起跪於榻前臣等幸無敗事昨面授文字不敢藏於家即納於上前上徐自發封示之乃白紙一張也上神武機權如此初特以是申命令使果犯而發封見為白紙則必入禀及歸而示之又將以見初無輕斬之意恩威兩得故雖彬等無不折服仁宗初復制科立等甚嚴首得富公次得吳春卿張安道蘇儀甫惟吳春卿入三等富公而下皆第四等自是訖蘇子瞻方再入第三等設科以來兩人而已故子瞻謝啓云誤占久虛之等按此條已見第二卷此係重出緣中間詳略稍異今並存之國初貢舉法未備公卿子弟多艱於進取蓋恐其請託也范杲魯公之兄子見知陶穀竇儀皆待以甲科㑹有言世祿之家不當與寒畯爭科名者遂不敢就試李內翰宗諤已過省以文正為相唱名辭疾不敢入亦被黜文正罷相方再登科天僖後立法有官人試不中者皆科私罪仍限以兩舉或云王冀公所請也慶厯以來條令日備有官人仍别立額於是進取者始自如矣考異天禧二年王欽若請鎖㕔人不及格坐私罪天聖四年詔免責罰聽再舉以舊制試禮部不及格贖銅永不得應舉也七年詔文臣許應兩次武臣一次蓋科罪者王冀公所請而免責罰許兩次者乃後來從寬今併云冀公所請非也天僖當作天禧歐陽文忠公初薦蘇明允便欲朝廷不次用之時富公韓公當國雖韓公亦以為當然獨富公持之不可曰姑少待之故止得試銜初等官明允不甚滿意再除方得編修因革禮前輩慎重名器如此元祐間富紹庭欲從子瞻求為富公神道碑久之不敢發其後不得已而言一請而諾人亦以此多子瞻也元祐初文潞公為太師吕申公為左僕射皆以髙年特賜免拜二公力辭蘇子瞻為翰林學士因論八十拜君命一坐再至此但傳命非朝見猶且不免周天子賜齊小白無下拜非不拜謂無降階然終下拜今二臣既辭宜當從其請遇見間或傳宣免則可為非常之恩仍降允詔當時以為得體故事臣寮告老一章即從仁宗時始命一章不允兩章而後從所以示優禮也熙寧末范景仁以薦蘇子瞻孔經甫不從曰臣無顔可見班列乃乞致仕章四上不報最後第五章併論青苗法於是始以本官致仕神宗初未嘗怒也景仁既得謝猶居京師者三年時王禹玉為執政與景仁久同翰林景仁每從容過之道舊樂飲終日自不以為嫌當權者亦不之責元祐初熙寧元豐所廢舊臣自司馬溫公以下皆畢集於朝獨景仁屢召不至世尤以為髙云唐人記張延賞妻苗晉卿女父為宰相舅嘉貞子宏靖皆宰相壻韋臯雖不為真相而食王爵以為有唐衣冠之盛一門而已本朝韓忠獻億夫人王魏公女忠獻參知政事雖不為相而康公玉汝皆洊登相位按舊本康公以下有脫文今據宋史本傳增入持國又為門下侍郎長子綜雖早死亦為知制誥皆王氏出壻李內翰淑與苗氏殆不相逺他士族未有比者宰執每嵗有內侍省例賜新火冰之類將命者曰快行家皆以私錢一千贈之元豐元年除日神宗禁中忽得吳道子畫鍾馗像因使鏤板賜二府吳沖卿時為相欲贈以常例王禹玉曰上前未有特賜此出異恩當稍增之乃贈五千其後御藥院遂為故事明年除日復賜沖卿例復授五千沖卿因戲同列曰一馗足矣衆皆大笑宣和間一二大臣恩幸既殊將命之人有飲食果實而得五十千者日或至一再賜也司空圖朱全忠篡立召為禮部尚書不起遂卒宋次道為河南通判時嘗於御史臺案牘中得開平中為圖薨輟朝敕乃知雖亂亡之極禮文尚不盡廢至如表聖蓋義不仕全忠者然亦不以是簡之也大臣及近戚有疾恩禮厚者多宣醫及薨例遣內侍監護葬事謂之敕葬國醫未必皆髙手既被旨須求面投藥為功病者不敢辭偶病藥不相當往往又為害敕葬喪家無所預一聽於監護官不復更計費惟其所欲至罄家資有不能辦者故諺云宣醫納命敕葬破家近年敕葬多上章乞免朝廷知其意無不從者試院官舊不為小録崇寧初霍端友榜安樞密惇知舉始創為之余時為㸃檢試卷官自後遂為故事進士小録具生月日時者叙齒也安喜考命時考官有善談命者數人安日使論之故亦具生月日時則過矣公燕合樂每酒行一終伶人必唱嗺酒然後樂作此唐人送酒之辭本作碎音今多為平聲文士亦或用之王仁裕詩淑景易從風雨去芳樽須用管絃嗺京師百司胥吏每至秋必醵錢為賽神㑹往往因劇飲終日蘇子美進奏院㑹正坐此余嘗問其何神曰蒼王蓋以蒼頡造字故胥吏祖之固可笑矣官局正門裏皆於中間用小木龕供佛曰不動尊佛雖禁中諸司皆然其意亦本吏畏罷斥以為禍福甚驗事之極恭此不惟流俗之謬可笑雖神佛亦可笑也舊制學士以上賜御仙花帶而不佩魚雖翰林學士亦然惟二府服笏頭帶佩魚謂之重金元豐官制行始詔六曺尚書翰林學士雜學士皆得佩魚故蘇子瞻謝翰林學士表云玉堂賜篆仰淳化之彌文寶𢃄重金佩元豐之新渥玉堂之署四字太宗飛白書淳化中以賜蘇易簡按此條詳見第七卷恐别有脫誤今並存之樞密院既専總兵柄宰相非兼領殆不復預聞慶厯初元昊用兵富公為諌官乃請宰相如故事兼院事時吕文靖為相不欲兼富公爭之力遂兼樞密使自是相繼為相者初授除皆帶兼使八年文潞公自參知政事相始不帶兼使於是皇祐初宋莒公龎潁公相皆不兼蓋元昊已納欵故也神宗初更官制王荆公諸人皆欲罷樞密院神宗難之其後遂定官制論者終以宰相不預兵政為嫌使如故事復兼則非正名之意乃詔釐其事大小大事三省與樞密同議進呈畫㫖稱三省樞密院同奉聖㫖三省官皆簽書付樞密院行之小事樞密院獨取㫖行訖關三省每朝三省樞密院先同對樞密院退待於殿廬三省始留進呈三省事退樞密院再上進呈獨取㫖遂為定制殿廬幕次三省官為一幕樞密院為一幕兩省官為一幕尚書省官為一幕御史臺為一幕中司則獨設椅子坐於隔門之內惟翰林學士與知開封府同幕蓋舊制知府常以翰林學士兼故也始樞密院與中書門下同一幕趙中令末年太祖惡其専而樞密使李崇矩乃其子婦之父故特命拆之迄今不改唐制惟𢎞文館集賢院置學士宰相得兼外他官未有兼者亦別無學士之名如翰林學士侍講學士侍讀學士侍書學士乃是職事之名爾自後唐安重誨為樞密使明宗以其不通文義始置端明殿學士以馮道趙鳯為之班樞密使下食於其院端明即正衙殿也本朝改端明為文明以命程羽自後文明避真宗諡號改紫宸既又以紫宸非人臣所稱改觀文則端明文明紫宸本一殿觀文雖異而創職之意則同四名均一等職也明道中既别改承明殿為端明仍置學士中間又設資政殿大學士學士則職名增多不得盡循舊制始真宗為王冀公置資政殿學士班樞密下此即文明之職也蓋是時真宗眷冀公方厚故不除文明而别創此名及丁文簡之罷參政不除資政殿大學士復置觀文觀文班在資政殿大學士上而皇祐中乃以命孫威敏蓋用丁文簡故事爾輕重疑亦不倫近嵗自資政殿以上皆為二府職名乃是本朝新制而端明殿為從官兼職之冠則後唐故事也考異唐𢎞文館集賢殿學士有非宰相而為之者宰相亦非兼也明皇以集仙殿為集賢殿麗正書院為集賢院殿與院不同此云集賢院非也有大學士有直學士此云他官未有兼者亦別無學士之名非也端明即西京正衙殿當有西京二字資政殿大學士班文明學士下翰林學士承旨上此云班樞密下又云即文明之職不知何據第六卷云班翰林承旨上第十卷云班樞密副使下前後不同近嵗有非二府而除資政者亦有二府罷止除端明者端明往往特拜此云近嵗自資政殿以上皆為二府職名是本朝新制而端明為從官兼職之冠則後唐故事皆非也古者喪服有負版綴於領下垂放之方尺有八寸服傳所謂負廣出於適寸者也鄭氏言負在背上適辟領也蓋喪服之制前有衰後有負版左右有辟領此禮不見於世久矣自秦漢以來未之閒翟內翰公巽嘗言論語式負版非板籍之版乃喪服之版以子見齊衰者必式為證堯稱陶唐氏舜稱有虞氏禹稱有夏氏唐虞夏氏其封國或其所生土名故其先皆命以為氏後因以為國則堯舜禹者疑其為諡號也然易稱堯舜氏作則堯舜亦氏豈復追稱之或以諡耶其通稱則皆謂之帝秦本欲稱泰皇既去泰號稱皇帝固已過矣漢以後因之不能易至唐武后天授中加尊號曰聖神皇帝中宗神龍加尊號曰應天皇帝明皇又以年冠之稱開元皇帝其後更相衍多至十餘字此乃生而為諡果何禮哉本朝初廢不講仁宗景祐初羣臣用開元故事請以景祐為號自是每遇南郊大禮畢則百官拜表加上尊號以示歸美之意神宗即位諸臣纍上尊號皆辭不受元豐三年遂下詔罷之帝王之盛舉也俗稱翰林學士為坡蓋唐德宗時嘗移學士院於金鑾坡上故亦稱鑾坡唐制學士院無常處駕在大內則置於明福門在興慶宫則置於金明門不専在翰林院也然明福金明不以為稱不常居之爾諌議大夫亦稱坡此乃出唐人之語諌議大夫班本在給舍上其遷轉則諌議嵗滿方遷給事中自給事中遷舍人故當時語云饒道斗上坡去亦須却下坡來以諌議為上坡故因以為稱見李文正所記國初取進士循唐故事每嵗多不過三十人太宗初即位天下已定有意於修文嘗語宰相薛文惠公治道長久之術因曰莫若參用文武之士吾欲於科場中廣求俊彥但十得一二亦可以致治居正曰善是嵗御試題以訓練將為賦主聖臣賢為詩蓋以示參用之意特取一百九人自唐以來未有也遂得吕文穆公為狀頭李參政至第二人張僕射齊賢王參政化基等數人皆在其間自是連放五榜通取八百一人一時名臣悉自此出矣考異國初取進士每嵗有不止三十人者此云多不過三十人非也唐末五代武選有東西頭供奉左右班侍禁殿直本朝又增內殿承制崇班皆禁廷奉至尊之名然宰執及戚里當時得奏乞給使恩澤皆例受此官沿習既久不以為過政和中改武官名有拱衛親衛大夫等職宰相給使有至此官者㑹其將罷或欲隂中之因言人臣而用拱衛親衛意不可測不知亦前日承制侍禁之類也唐致仕官非有特敕例不給俸國初循用唐制至真宗乃始詔致仕官特給一半料錢蓋以示優賢養老之意當時詔云始呈材而盡力終告老以乞骸賢哉雖歎於東門邈矣遂辭於北闕用尊耆德特示殊恩故士之得請者頗艱慶厯中馬季良在謫籍得致仕言者論而奪之蓋以此其後有司既為定制有請無不獲人寖不以為貴乃有過期而不請者於是御史臺每嵗一檢舉有年將及格者則移牒諷之今亦不復舉矣考異唐貞元五年蕭昕等致仕給半俸遂為例太和元年楊於陵致仕特全給俸料辭云半給之俸近古所行伏自思惟已為過幸此云唐致仕官非有特敕例不給俸非也太宗淳化元年詔致仕官給半俸此云真宗非也咸平五年謝泌言致仕官近皆遷秩今録授朝官給半俸須有清名及勞效乃可聽乃詔七十以上求退者許致仕因疾及厯任有贓犯者聽從便若謫籍不得致仕後來亦然范忠宣公是也蘇子由詩云餘年迫懸車奏草屢濡筆籍中顧未敢爾後當容乞是也明道二年大赦丁謂特許致仕真宗朝御史盧琰言朝士有衰老不退者請舉休致之典時二三名卿猶有不退之譏則過期不請非獨後來也唐三院御史謂侍御史與殿中侍御史監察御史也侍御史所居曰臺院殿中曰殿院監察曰察院此其公宇之號非官稱也侍御史自稱端公知雜事則稱雜端而殿中監察稱曰侍御近世殿院察院乃以名其官蓋失之矣而侍御史復不稱臺院止曰侍御端公雜端但私以相號而不見於通稱各從其所沿襲而已考異因話録侍御史衆呼為端公非自稱也唐御史臺北向蓋沿隋之舊公堂㑹食侍御史設榻於南而主簿在北兩院分為東西故俗號侍御史為南榻監察御史裏行監察御史之資淺者也始唐太宗自布衣擢馬周令於監察御史裏行遂以名官馬周𫝊不載六典言之或曰始龍朔中王本立亦見唐人雜記然不若六典為可據也考異馬周王本立為監察御史裏行皆見唐書職官志此云見六典及唐人雜記不若以唐書為據也唐侍御史殿中侍御史皆有裏行非獨監察御史也唐詔令雖一出於翰林學士然遇有邊防機要大事學士所不能盡知者則多宰相以其處分之要者自為之辭而付學士院使增其首尾常式之言而已謂之詔意故無所更易增損今猶見於李德裕鄭畋集中近嵗或盡出於宰相進呈訖但召待詔即私第書寫或詔學士宰相面授意使退而具草然不能無改定也元祐初用治平故事命大臣薦士試官職多一時名士在館率論資考次遷未有越次進用者皆有滯留之歎張文潛朝無咎俱在其間一日二人閲朝報見蘇子由自中書舍人除户部侍郎無咎意以為平緩曰子由此除不離核謂如果之粘核者文潛遽曰豈不勝汝枝頭乾乎聞者皆大笑東北有果如李每熟不得摘輒便槁土人因取藏之謂之枝頭乾故云陳恭公自為參政時仁宗即眷之厚不但以其嘗請建儲德之也皇祐初趙清獻諸人攻恭公二十餘章意終不解一日喟然顧一老中官曰汝知我不樂乎中官曰豈非以陳相公去住未定耶上曰然中官曰此亦易爾既臺諌官有言何不從之使去上曰我豈不知此但難得如此老子不謾我爾後不得已欲罷之猶令自舉代恭公薦吳正肅公即召至闕下㑹賜宴正肅疾作不果相然世亦以此多恭公也陳恭公初相張安道為學士仁宗召至幄殿面諭曰善為草麻辭無使外人得有言蓋恐其物望未孚也安道載其請建儲之事云納忠先帝有德朕躬上覽稱善及恭公薨墓碑未立時論者猶未一上賜額曰褒忠之碑特命安道為之故安道首言褒忠碑者皇帝神筆表揚故相岐國公執中之遺烈也於是遂無議之者考異納忠先帝有德朕躬乃陳恭公除參政制詞此云麻詞非也陳希夷將終密封一緘付其弟子使候其死上之既死弟子如其言入獻真宗發視無他言但有慎火停水四字而已或者以為道家養生之言而當時皆以為意在國事無以是解者已而祥符間禁中諸處數有大火遂以為先告之驗上以軍營人所聚居尤所當戒乃命諸校悉書之門故今軍營皆揭此四字元祐初哲宗將納后得狄咨女宣仁意向之而庶出過房以問宰執或曰勳臣門閥可成王彥霖為簽書樞密院曰在禮問名女家答曰臣女夫婦所生及列外氏官諱今以狄氏為可將使何辭以對宣仁默然遂罷議考異元祐初當作元祐六年帝女謂之公主蓋婚禮必稱主人天子不可與羣臣敵故以同姓諸侯主之主者言主婚爾而漢又有稱翁主者諸侯之女也翁者老人之稱古人大抵謂父為翁諸侯自相主婚無嫌故稱翁者謂其父自主之也自六朝後諸王之女皆封縣主隋以後又有稱郡主者自是遂循以為故事則主非主婚之名蓋尊之猶言縣君郡君云爾國初趙韓王以開國元臣詔諸女特比宗室皆封郡主臣庶而封主者惟趙氏一家而已而名實之差流俗相習而不悟主君皆尊稱則縣主縣君郡主郡君初何所辨但以非宗室不封故從以為異也大駕玉輅世傳為唐髙宗時物堅壯穩利至今不少損元豐間禮文既一新有司請别造新輅詔宋用臣董之備極工巧珠寶之飾既成以正旦大朝㑹宿陳於大慶殿廷車人先以幕屋覆之將旦徹屋忽其上一木墜盡壓而碎一木之勢蓋不能至此人以為異自後竟乘舊輅金明池龍舟太宗時造每嵗春駕上池必登之紹聖初亦嘗命別造形制有加於前亦號工麗余時正登第在京師初成瓊林賜燕蔡魯公為承旨中休往登以觀至半輒墜水幾不免相繼哲宗臨幸是日大風晝冥池水盡波儀衛不能立竟不能移跬步自後遂廢不用二事適相似亦可怪也
