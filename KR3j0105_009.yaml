body:
  text: 石林燕語卷九宋葉夢得撰宇文紹奕考異北京舊不兼河北路安撫使仁宗特以命賈文元故文元召程文簡為代乞只領大名一路後文元再鎮固求兼領乃復命之且詔昌朝罷則不置及熙寧初陳𤾉叔守北京遂以文元故事兼領熙寧初中書議定改宗室條制召學士王禹玉草制禹玉辭曰學士天子私人也若降詔付中書施行則當草之今中書已議定宗室事則當使舍人院草敕爾學士非所預不敢失職也乃命知制誥蘇子容草敕近世凡朝廷詔命皆學士為之重王命也熙寧三年九月詔中書五房各置檢正官二員在堂後官之上都檢正一員在五房提㸃之上皆以士人為之於是以吕微仲為都檢正孫巨源吏房李邦直禮房曽子宣户房李奉世刑房澶淵之盟初以曹利用奉使許嵗幣三十萬其後劉六符來始增二十萬為五十萬元昊初遣如定來求和朝廷許以嵗幣十萬未稱臣乃使張子奭奉使而肯稱臣子奭遂許以二十萬樞密都承㫖與副承㫖祖宗皆用士人比僚屬事參謀議真宗後天下無事稍稍遂皆用吏人歐公建言請復舊制而不克行熙寧初始用李評為都承㫖至今行之初評受命文潞公為樞密使以舊制不為之禮評訴於神宗命史官檢詳故事以久無士人為之檢不獲乃詔如閣門使見樞密之禮仁宗時臺官有彈擊教坊倭子鄭州來者朝中傳以為笑歐公以為今臺官舉人須得三丞以上成資通判者所以難於充選因請略去資格添置御史裏行但選材堪此選資深者入三院資淺者為裏行熙寧初實用此議也元祐二年詔職事官並許帶職尚書二年加直學士中丞侍郎給事諫議通及一年加待制論者紛然以為不當王彥林為十不可之說以獻謂尚書二年加直學士若一年而罷與之直學士則過與之待制則與尚書侍郎何異其以罪被謫者常例當落職若落職名則不問過之輕重與職事官為落兩重職若止落職事官則與平遷善罷何異官制以來由諫議大夫中書舍人方為給事中由給事中方為侍郎而中丞又在侍郎之上今槩以一年為待制則等差莫辨待制祖宗之時其選最精出入朝廷才一二人今立法無定員將一年之後待制滿朝必有車載斗量之謠大要如是劉莘老為中丞劉器之為司諫皆以為言朝廷不以為然其後莘老作相亦竟不能自改也治平初王景彛自御史中丞除樞密副使錢公輔為知制誥繳詞頭時英宗初即位韓魏公當國以為始除大臣而不奉詔恐主威不立乃特責滁州團練副使議者以為太過司馬君實知諫院意亦以為是而不救及後論陜西義勇事章六上不行乃於求罷章中始云錢公輔一上章止樞密副使恩命於詔令未行之前而責授散官臣六上章沮宰相大議於詔令已行之後而不以為罪是典刑不均一矣請比公輔更責逺小處疏入不報蓋意指魏公也狄武襄狀貌竒偉初𨽻拱聖籍中為延州指使范文正一見知其後必為名將授以左氏春秋遂折節讀書自春秋戰國至秦漢用兵成敗貫通如出掌中與尹師魯尤善師魯與論兵法終不能屈連立戰功驟至涇原經略招討副使仁宗聞其名欲召見㑹寇入平涼詔圖形以進於是天下始聳然畏慕之神宗初即位有意二邊一日忽內出御製祭文遣使祭其墓欲以感勵將士或云滕元發之辭也狄武襄以樞密副使出討儂智髙換宣徽南院使宣撫荆湖南北路經制廣南盜賊事師還復舊任蓋不欲以本官外使也如嘉祐末韓魏公待郭逵厚始使帶簽書樞密院知延州故熙寧初王樂道論魏公為用周太祖故事命逵蓋郭威實由是變也魏公亦無以解考異治平三年郭逵以簽書樞密院事為陜西四路宣撫使兼判渭州後以宣徽使判延州此云嘉祐末又云逵帶簽書樞密院事知延州皆非王樂道論韓魏公用逵事在治平四年此云熙寧初亦非也賈文元初以晉陵縣主簿為國子監說書孫宣公為判監始見因㑹學官各講一經既退謁宣公久之不出徐令人持唐書路隋韋處厚傳使讀文元了不喻已乃見之曰知所以示二傳乎曰不知宣公言君講書有師法他日當以經術進如二公勉自愛其後宣公辭講筵請老即薦文元自代時官猶未甚顯未幾仁宗卒為創崇政殿說書命之崇政殿說書自文元始云慶歷中契丹遣蕭英劉六符來求取關南北地朝廷患之王武恭帥定州敵密遣人來覘候吏得之偏禆皆請斬之以徇衆武恭特不問明日出獵近郊號三十萬親執桴鼓示衆下令曰具糧糗視大將軍旗所向即馳敢後者斬覘者歸密以告敵疑漢兵將深入無不懼仁宗亟遣使問計對曰咸平景德邊兵二十餘萬皆屯定武不能分扼要害故敵得軼境徑犯澶淵且當時以陳圖賜諸將人皆謹守不敢自為方略緩急不相援多至於敗今願無賜陳圖第擇諸將使應變出竒自立異功則無不濟仁宗以為然晏元獻公喜推引士類前世諸公為第一為樞府時范文正公始自常調薦為祕閣校勘後為相范公入拜參知政事遂與同列孔道輔微時亦嘗被薦後元獻再為御史中丞復入為樞府道輔實代其任富韓公其壻也吕申公薦報聘契丹公時在樞府亦從而薦之不以為嫌蘇子容為諡議以比胡廣與陳蕃並為三司謝安引從子元北伐云王武恭公自樞密使謫知隨州孔道輔所論也道輔死或有告武恭害公者死矣武恭愀然歎曰可惜朝廷又喪一直臣文潞公為唐質肅所擊罷宰相質肅亦坐貶嶺外至和間稍牽復為江東轉運使㑹潞公復入相因言唐某疏臣事固多中初貶已重而久未得顯擢願得復召還仁宗不欲止命遷官除河東夏文莊韓魏公皆自樞密副使為三司使漢舉賢良自董仲舒以來皆對策三道文帝二年對策者百人朝錯為髙第武帝元光五年對策者亦百人公孫宏為第一當時未有黜落法對策者皆被選但有髙下爾至唐始對策一道而有中否然取人比今多建中間姜公輔等二十五人太和間裴休等二十三人其下如貞元中韋執誼崔元翰裴洎等皆十八人元和中牛僧孺等長慶中龎嚴等至少猶皆十四人蓋自後周加試策論三道於禮部每道以三千字為率本朝加試六論或試於祕閣合格而後御試故得人頗艱然所選既精士之濫進者無幾矣考異文帝十五年策朝錯等非二年也賢良策見于漢書者惟董仲舒三道餘皆一道此云自仲舒以來皆對策三道不知何所據耶百人皆當云百餘人又仲舒及嚴助傳亦皆云百餘人蘇子容過省賦歷者天地之大紀為本場魁既登第遂留意歷學元豐中使契丹適㑹冬至契丹歷先一日趨使者入賀契丹不禁天文術數之學往往皆精其實契丹歷為正也然勢不可從子容乃為泛論歷學援據詳博契丹莫能測無不聳聽即徐曰此亦無足深較但積刻差一刻爾以半夜子論之多一刻即為今日少一刻即為明日此蓋失之多爾契丹不能遽折遂從歸奏神宗大喜即問二厯竟孰是因以實言太史皆坐罰金元祐初遂命子容重修渾儀制作之精皆出前古其學略授冬官正袁惟幾而創為規模者吏部史張士亷士亷有巧思子容時為侍郎以意語之士亷輒能為故特為精密金人陷京師毁合臺取渾儀去今其法蘇氏子孫亦不傳云元昊叛議者爭言用兵伐叛雖韓魏公亦力主其說然官軍連大敗者三初圍延州執劉平石元孫於三川口康定元年也明年敗任福於好水川福死之慶歷元年也又明年冦鎮戎軍敗葛懷敏於定州寨執懷敏喪師皆無慮十餘萬中間唯任福襲白豹城能破其四十一族爾范文正欲力持守策以嵗月經營困之無速成功故無大勝亦無大敗神宗天性至孝事慈聖光獻太后尤謹升遐之夕王禹玉為相入慰執手號慟因引至斂所發視御容左右皆感絶將斂復召侍臣觀入梓宫物親舉一玉碗及玉絃曰此太后常所御也又慟幾欲仆禹玉為挽辭云誰知老臣淚曽及見珠襦又云朱絃湘水急玉碗漢陵深皆紀實也慶歷二年富鄭公知諫院吕申公章郇公當國時西事方興鄭公力論宰相當通知樞密院事二公遂皆加判樞密院已而以判為太重改兼樞密使五年二公罷賈文元陳恭公繼相遂罷兼使案此條已見第八卷內此係復出韓康公得解過省殿試皆第三人其後為執政自樞密副使𠫭知政事拜相及再宰四遷皆在熙寧中此前輩所未有也蘇子容挽辭云三登慶歷三人第四入熙寧四輔中范文正公以晏元獻薦入館終身以門生事之後雖名位相亞亦不敢少變慶歷末晏公守宛邱文正赴南陽道過特留歡飲數日其書題門狀猶皆稱門生將别以詩叙殷勤投元獻而去有曾入黃扉陪國論却來絳帳就師資之句聞者無不歎伏王禹玉歷仁宗英宗神宗三朝為翰林學士其家自太平興國至元豐十榜皆有人登科熙寧初葉尚書祖洽榜聞喜燕席上和范景仁詩云三朝遇主惟文翰十榜傳家有姓名此事他人所無有也范文正公始以獻百官圖譏切吕申公坐貶饒州梅聖俞時官旁郡作靈烏賦以寄所謂事將兆而獻忠人返謂爾多凶蓋為范公設也故公亦作賦報之有言知我者謂吉之先不知我者謂凶之類及公秉政聖俞久困意公必援已而漠然無意所薦乃孫明復李泰伯聖俞有違言遂作靈烏後賦以責之略云我昔閔汝之忠作賦弔汝今主人誤豐爾食安爾巢而爾不復啄叛臣之目伺賊壘之去反憎鴻鵠之不親愛燕雀之來附意以其西師無成功世頗以聖俞為隘太宗時陳文忠公廷試第一曾㑹第二皆除光祿寺丞直史館㑹繼遷殿中丞知宣州賜緋衣銀魚前無此比也治平初彭器資諒暗榜亦為進士第一乃連三任職官十年而後始改太子中允蓋器資未嘗求於當路代還多自赴吏部銓然卒以是知名仕宦淹速信不足較也元厚之少以文字自許屢以贄歐陽文忠卒不見録故在嘉祐初治平間雖為從官但多歷監司帥守熙寧初荆公當國獨知之始薦以為知制誥神宗猶未以為然會廣西儂智髙後復𫝊溪峒有警選可以經略者乃自南京遷知廣州既至邊事乃誤𫝊其謝上表云橫水明光之甲得自虛𫝊雲中赤白之囊唱為危事蓋用澤潞李文饒及丙吉𫝊中事神宗覽之大稱善後遂自荆南召為翰林學士元祐初魏王喪在殯秋燕太常議天子絶朞不妨燕蘇子瞻為翰林學士當撰致語上疏援荀盈未葬平公飲酒樂膳宰屠蒯以為非周穆后既葬除喪景王以賔燕叔向議之以為若絶朞可以燕樂則平公景王何以見非余謂天子絶朞謂不為服也不為服則不廢樂太常之議是矣以為情有所不忍則特輟樂如屠蒯叔向之言可也不當更論絶朞為言如富鄭公母在殯而仁宗特罷春燕叔父豈不重於宰相之母惜乎子瞻不知出此也考異按春秋左氏𫝊昭公九年晉荀盈如齊卒於戲陽殯于絳未葬晉平公飲酒樂膳宰屠蒯趨入酌以飲工曰汝為君耳將司聰也辰在子卯謂之疾日君徹燕樂學人舍業為疾故也君之卿佐是謂股肱股肱或虧何痛如之汝弗聞而樂是不聰也公說徹樂又按昭公十五年晉荀躒如周葬穆后既葬除喪周景王以賔燕叔向譏之謂之樂憂夫晉平公之於荀盈按此下疑有脫文仁宗以宰臣張知白之喪特罷社燕比例尤的子瞻所奏正引仁宗以宰相富弼母在殯為罷春燕事且云魏王之親比富弼之母輕重亦有間矣此乃云子瞻不知出此何耶治平間歐陽永叔罷參知政事知亳州除觀文殿學士相繼趙叔平罷知滁州亦除其後非執政而除者王韶以邊功王樂道以宫僚皆特恩也考異歐陽永叔罷政在治平四年前此如丁度韓琦髙若訥富弼孫沔田况張觀程戡孫抃胡宿皆以前執政或初罷政除觀文殿學士此止舉歐趙二人何耶故事館職皆試詩賦各一篇熙寧元年召試王介安燾陳侗蒲宗孟朱初平始命改試策論各一道於是始試敕天之命惟時惟幾論問古用民嵗不過三日策吕寶臣為樞密使神宗欲用晦叔為中丞不以為嫌乃召蘇子容就曽魯公第草制中云惟是一門公卿三朝侍從久欲登於近用尚有避於當途况朕方以至公待人不疑羣下豈以弟兄之任事而廢朝廷之擢才矧在仁祖之時已革親嫌之制臺端之拜無以易卿著上意也晦叔既辭上命中使押赴臺禮上公弼亦辭位不從神宗既不相潞公而相陳暘叔乃詔𤾉叔班潞公下潞公辭曰國朝未有樞密使居宰相上者惟曹利用嘗先王曾張知白臣忝文臣不敢亂官制力辭久之不聽乃班暘叔上已而閣門言舊制宰相壓親王親王壓使相今彥博先升之則遇大朝㑹親王並入亦當帶壓親王潞公復辭始許班暘叔下故事三院御史論事皆先申中書得劄子而後始登對諫官則不然熙寧初始詔依諫官例聽直牒閣門請對熙寧三年制科過閣孔文仲第一吕陶亦在選中既殿試文仲陳時病語最切直吕陶稍直宋敏求蒲宗孟初考文仲書第三等王禹玉陳睦覆考書第四等王荆公見之怒不樂中批出黜文仲令速發赴本任吕陶升一任與堂除差遣自是遂罷科故事南省奏名第一殿試唱過三名不及則必越衆抗聲自陳雖考校在下列必得升等吳春卿歐陽文忠皆由是得升第一甲獨范景仁避不肯言等輩屢趣之皆不應至第十九人方及徐出拜命而退時已服其靜退自是廷試當自陳者多慕效之近嵗科舉當升等人其目不一有司皆預編次唱名即舉行其風遂絶王沂公初就殿試時固已有盛名李文靖公沆為相適求壻語其夫人曰吾得壻矣乃舉公姓名曰此人今次不第後亦當為公輔是時吕文穆公家亦求姻於沂公公聞文靖言曰李公知我遂從李氏唱名果為第一晏元獻公嘗屬范文正公擇壻久之文正言有二人其一富髙一張為善公曰二人孰優曰富君器業尤逺大遂納富即富公也時猶未改名以宰相得宰相衣冠以為盛事為善亦安道舊名張文節公初為龍圖閣待制求判國子監真宗問王魏公國子清間無職事知白豈不長於治劇欲自便耶魏公對知白博學通曉民政但其所守素清而亷於進取故爾上曰若此正好為中執法乃命以右諫議大夫除御史中丞上用人如此景德天禧間所以名臣多也神宗嘗問經筵官周官前朝後市何義黃右丞履時為侍講以王氏新說對言朝陽事故在前市陰事故在後上曰亦不獨此朝君子所集市小人所居向君子背小人之意諸臣聞之竦然哲宗初即位契丹弔哀使入見蔡持正以契丹大使衣服與在廷異上春秋少恐升殿驟見或懼前一日奏事罷從容言其儀狀請上勿以為異重復數十語皆不答徐俟語畢上曰彼亦人耳怕他做甚持正竦然而退司馬溫公與吕申公素相友善在朝有所為率多以取則溫公自修起居注召試知制誥申公亦自外同召溫公既就試而申公力辭不至改除天章閣待制溫公大悔自以為不及命下凡九章辭不拜引申公自比云臣與公著同被召公著固辭得請而臣獨就職是公著亷遜而臣無愧恥也朝廷察其誠因亦除天章閣待制考異溫公與申公相友善云在朝有所為率多以取則非也溫公辭修注云王安石差修起居注力自陳訴章七八上然後朝廷許之臣乃追悔恨嚮者非朝廷不許由臣請之不堅故也使臣之才得及安石一二則聞命之日受而不辭今臣自循省一無可取乃與之同被選擢比肩並進豈不玷朝廷之舉為士大夫所羞哉辭知制誥云竊聞天章閣侍講吕公著與臣同時被召公著辭讓不至朝廷已除公著天章閣待制臣始自悔恨云云辭修注則引荆公辭知制誥則引申公各一時之事非有所取則也政和末李彥章為御史言士大夫多作詩有害經術自陶淵明至李杜皆遭詆斥詔送敕局立法何丞相執中為提舉官遂定命官𫝊習詩賦杖一百是嵗莫儔榜上不賜詩而賜針未幾知樞密院吳居厚喜雪御筵進詩稱口號自是上聖作屢出士大夫亦不復守禁或問何立法之意何無以對乃曰非為今詩乃舊科場詩耳石林燕語卷九
