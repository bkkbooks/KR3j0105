body:
  text: 石林燕語卷四宋葉夢得撰宇文紹奕考異官制寄禄官銀青光禄大夫與光禄正議中散朝議皆分左右朝議中散有出身人皆超右其餘並以序遷大觀中余為中書舍人奉詔以為非元豐本意下擬定釐正乃㕘取舊名以奉直易右朝議中奉易左中散通奉易右正議正奉易右光禄宣奉易左光禄而右銀青光禄大夫正為光禄大夫遂為定制故事百官磨勘中書止用定辭熙寜中孫巨源為知制誥建言君恩無髙下何獨於磨勘簡之非所以重王命也乃詔各為辭元豐官制行惟侍従官而上吏部檢舉奏抄命辭他官自陳於吏部奏抄擬遷而不命辭國朝兩制皆避宰相執政官親曽魯公修起居注賈文元為相其友壻也當召試乃除天章閣待制文元去位始為知制誥劉原甫王文定之甥文定之為㕘知政事乃以侍讀學士出知揚州宋子京王原叔為翰林學士子京避莒公改龍圖閣學士原叔避文安改侍讀學士元祐間蘇子由秉政子瞻自揚州召為承旨引原叔例請補外不従近嵗惟避本省官如宰相二丞親則不除尚書侍郎門下侍郎親則不除給事中中書侍郎親則不除舍人之類六曺尚書避親多除翰林學士盖於三省無所𨽻異於舊制自子瞻以來然也大駕儀仗通號鹵簿蔡邕獨斷已有此名唐人謂鹵櫓也甲楯之别名凡兵衛以甲楯居外為前導捍蔽其先後皆著之簿籍故曰鹵簿因舉南朝御史中丞建康令皆有鹵簿為君臣通稱二字別無義此説為差近或又以鹵為鼓簿為部謂鼔駕成於部伍不知鹵何以謂之鼔又謂石季龍以女騎千人為一鹵部簿乃作部皆不可曉今有鹵簿記宋宣獻公所修審以部為簿籍之簿則既云簿不應更言記唐制節度使加中書門下平章事為使相自郭元振始李光弼等繼之盖平章事宰相之名以節度使兼故云爾也國朝因之元豐官制罷平章事名而以開府儀同三司易之亦帶節度使謂之使相盖以儀同為相也唐書言大臣初拜官獻食天子名曰燒尾蘇瓌為相以食貴百姓不足獨不進然唐人小説所載與此不同乃云士子初登科及在官者遷除朋僚慰賀皆盛置酒饌音樂燕之為燒尾舉韋嗣立入三品趙彦昭假金紫崔湜復舊官中宗皆令於興慶池燒尾則非獻食天子也其解燒尾之義以為虎豹化為人惟尾不化必以火燒之乃成人猶人之新除必樂飲燕客乃能成其榮其言迂誕無據然謂太宗已嘗問朱子奢則其來盖已久矣近世獻食天子固無是而朋僚以音樂燕集亦未之講也慶歴五年賈文元為相始建議重修唐書詔以判館閣王文安宋景文楊宣懿察趙康靖槩及張文定余襄公為史館修撰刋修未幾諸人皆以故去獨景文下筆已而景文亦補外乃許以史藁自隨編修官置局於京師者仍舊遇有疑議取證則移文於局中往來迂逺書久不及成是時歐陽文忠公非文元所喜且方貶出獨不得預嘉祐初文忠還范蜀公為諌官乃請以紀志屬文忠至五年書始成初文元以宰相自領提舉官及罷去陳恭公相辭不領乃命㕘知政事王文安訖奏書亦曽魯公以㕘知政事領也従駕謂之扈従始司馬相如上林賦云扈従横行出乎四校之中晉灼以扈為大張揖謂䟦扈縦横不案鹵簿故顔師古因之亦以為䟦扈恣縦而行果爾従盖作平聲侍天子而言䟦扈可乎唐封演以為扈養以従猶之僕御此或近之然不知通用此語自何時也唐自明皇以誕日為千秋節其後肅宗為地平天成節至代宗羣臣請建天興節不報自是厯徳順憲穆敬五帝皆不為節文宗太和中復置慶成節故武宗為慶陽節終唐世宣宗為夀昌節僖宗為嘉㑹節昭宗為乾和節中間惟懿宗不置則唐世此禮亦不常各係其時君耳千秋節詔天下咸燕樂有司休務三日其餘凡建節皆以為例穆宗雖不建節而紫宸殿受百官稱賀命婦光順門賀皇太后及有麟徳殿沙門道士儒官討論三教之制文宗時又嘗禁屠宰燕㑹惟蔬食脯醢後旋仍舊熙寜初改經義取士興建太學訖崇寜罷科賦每牓魁南省皆迭為得失始余中牓邵剛魁得次徐鐸牓按宋史及馬氏文獻通考俱作徐鐸舊本鐸訛作驛今改正余幹落時彦牓黄中魁得次黄裳牓侯綬落惟焦蹈牓陶直夫落差一牓次七牓李常寜畢漸李釡按馬氏文獻通考作李崟咸淳毘陵志作李奎舊本作釡未詳孰是今仍原文蔡薿牓章綡李朴蔡靖陳國林皆得馬涓何昌言霍端友牓費元量王瞻陳賔皆落不差一人亦可怪也時謂之雌雄解元兩京留臺皆有公宇亦榜曰御史臺舊為前執政重臣休老養疾之地故例不視事皇祐間呉正肅公為西京留臺獨舉其職時張堯佐以宣徽使知河南府郡政不當有訴於臺者正肅即為移文詰之堯佐惶恐奉行不敢異其後司馬温公熙寜元豐間相繼為者十七年雖不甚預府事然亦守其法令甚嚴如國忌行香等班列有不肅亦必繩治自創置宫觀後重臣不復為率用常調庶官比宫殿給使請俸差優爾朝廷既但以此為恩故來者奔走府廷殆與屬吏無異矣國朝侍従官間有換武職者盖唐袁滋故事例皆換觀察使如李尚書維自承旨李左丞衡自三司使皆然天聖間陳康肅以翰林學士知開封府亦換宿州觀察使加檢校司徒知天雄軍陳不樂行力辭明肅后以隻日御朝而喻之曰天雄朔方㑹府敵人視守臣為輕重非文武兼材不可陳不得已受命自是加留後遂建節慶厯中陜西用兵韓魏公范文正公龎莊敏公為帥皆以龍圖閣直學士換觀察使文正懇辭不拜盖當權者實欲排之而以俸優為言故文正不肯受已而韓龎亦辭遂罷臣僚上殿劄子末槩言取進止猶言進退也盖唐日輪清望官兩員於禁中以待召對故有進止之辭崔祐甫奏待制官候奏事官盡然後趨出於内廊賜食待進止至酉時放是也今乃以為可否取決之辭自三省大臣論事皆同一體著為定式若爾自當為取聖旨盖沿習唐制不悟也唐武徳初以太宗為西討元帥自是非親王不為安禄山叛以哥舒翰守潼闗除諸道兵馬元帥始以臣庶為之至徳初代宗以廣平王為天下兵馬元帥以郭子儀為副其後又以舒王謨為荆南等道節度諸軍行營都元帥加都字自是始此皆實領兵柄唐末以授錢鏐則姑以名寵之爾唐乾元中以户部尚書李峘為都統淮南江東江西節度使始立都統之號其後以節度使充者建中二年李勉以汴州節度使充汴宋滑亳河陽等道都統是也宰相充者中和二年王鐸以司徒中書令為京城四面諸道行營兵馬都統是也髙麗自三國以來見於史者句驪其國號髙其姓也隋去句字故自唐以來止稱髙麗五代史記後唐同光元年韓申來其王尚姓髙則自三國至五代止𫝊一姓長興中始稱權知國事王建王氏代髙當在同光長興之間而史失其𫝊元豐初王徽遣使金梯入貢建之七世孫也其表章稱知國王事盖習用其舊而年稱甲子以其受契丹正朔故也唐以宰相兼昭文館集賢殿學士結銜皆在官下盖兼職宜然本朝循用其舊而他學士則皆冠於官上此自五代趙鳯為之也始後唐置端明殿學士以命鳯及馮道後鳯遷禮部侍郎因懇宰相任圜升學士於官上盖自示其貴重故本朝觀文殿大學士而下皆以為例亦世以職為重故爾若宰相則所貴不待職也樞宻使唐書五代史皆不載其創始之因盖在唐本宦者之職唐中世後宦人使名如是者多殆不勝記本不係職官重輕而五代特因唐名而増大之故史官皆不暇詳考據續事始云代宗永泰中以中人董秀管樞宻因置内樞宻使續事始為蜀馮鑑所作也唐翰林學士結銜或在官下無定制余家藏唐碑多如太和中李藏用碑撰者言中散大夫守尚書户部侍郎知制誥翰林學士王源中之類則在官下大中中王巨鏞碑撰者言翰林學士中散大夫守中書舍人劉瑑之類則在官上瑑仍不稱知制誥殊不可曉不應當時官名而升降龎雜乃爾也尚書省文字下六司諸路例皆言勘㑹曽魯公為相始改作勘當以其父名㑹避之也京師舊有平準務自漢以來有是名蔡魯公相以其父名準亦改為平貨務唐舊制集賢書藏於門下省永泰後以勲臣罷節制歸京師者無職事欲以慰其意乃詔與儒臣日並於集賢院待制仍賜錢三千緡為食本以給其費於是郭英乂孫志直臧希讓髙昇王延昌與裴遵慶暢瓘崔渙賈至李季卿呉令珪等十一人皆在選待制之名於此盖無别於文武余有裴士淹所作孫志直碑待制給食入銜此出一時權宜後不以為常故唐書載之不詳向𫝊範欽聖太后之叔也在神宗時已為觀察使厯知陜州滄州矣神宗即位徙知鄆州楊繪知諌院言鄆州領京柬西路安撫使不宜以后族為之文潞公在樞府因稱𫝊範在先朝已累典大郡今用非以外戚上徐曰得諌官如此言亦甚好可以止他日妄求者乃移知潞州祖宗用人無私雖以材選而每不忘後世之戒如此婕妤史記索隱訓婕為承妤為佐字本皆従人大抵古人取訓各以其意適然者而字多従省盖倢捷也乃相承敏捷之意字従省去才伃為相予則訓佐理亦宜然後以為婦職因易人為女耳元豐既新官制建尚書省於外而中書門下省樞宻學士院設於禁中規模極雄麗其􅀢壁屏下悉用重布不紙糊尚書省及六曺皆書周官兩省及後省樞宻學士院皆郭熙一手畫中間甚有傑然可觀者而學士院畫春江曉景為尤工後兩省除官未嘗足多有空閑處㸔守老卒以其下有布往往竊毁盜取徐擇之為給事中時有竊其半屏者欲付有司㑹竊處有刃痕議者以禁廷經由株連所及多遂止然因是毁者浸多亦可惜也古者婦人無名以姓為名或係之字則如仲子季姜之類或繋之諡則如戴媯成風之類各不同周人稱王姬伯姬盖周姬姓故云而後世相承遂以姬為婦人通稱以戚夫人為戚姬虞美人為虞姬自漢以來失之政和間改公主而下名曰帝姬族姬此亦沿習熟慣而不悟國姓自當為嬴余嘗以白蔡魯公憚於改作而止曽宣靖公提舉修英宗實録成將上故事當遷一官曽官已左僕射乃豫辭於上曰臣官進一等則為司空此三公之職也坐而論道不可以賞勞神宗以為誠遂従其請書上曽獨不遷官人以為得體考異時韓忠獻進仁宗實録曽宣靖進英宗實録韓奏竊見宰臣李沆吕夷簡提舉編修太宗實録及三朝國史並乞書成更不推恩皆䝉上俞允云云曾言若遷官臣須改司空韓琦須改太保三公亦非賞勞之官遂皆許之然則其同時有韓其異時有李吕今止記曽豫辭於上而云獨曽不遷官人以為得體非也治平初議濮廟者六人吕獻可為中丞吕㣲仲范堯夫趙大觀傅欽之與龔鼎臣為御史既同時相繼被貶天下號六御史唐人初未有押字但草書其名以為私記故號花書韋陟五雲體是也余見唐誥書名未見一楷字今人押字或多押名猶是此意王荆公押石字初横一畫左引脚中為一圏公性急作圏多不圓往往窩匾而収横畫又多帶過常有宻議公押反字者公知之加意作圏一日書楊蟠差遣勅作圏復不圓乃以濃墨塗去旁别作一圏盖欲矯言者楊氏至今藏此勅祖宗時監司郡守薦部吏初無定員有其人則薦之故人皆慎重不肯輕舉改官每嵗殆無幾自慶厯後始以屬邑多寡制數於是各務充元額不復更考材實改官人嵗遂増至數倍事有欲革弊而反以為弊者固不得不慎其初治平中賈直孺為中司嘗以為言朝廷終莫能處盖人情沿習既久雖使復舊亦不可為也祖宗時見任官應進士舉謂之鏁㕔雖中選止令遷官而不賜科第不中者則停見任其愛惜科名如此淳化三年滁州軍事推官鮑當等應舉合格始各賜進士及第自是遂皆賜第考異太平興國五年見任官赴殿試者六人惟單餗周繕賜及第餘皆諸州節度掌書此云遷官而不賜科第非皆如此也天聖末詔即河南永安縣訾王山建宫以奉太祖太宗真宗神宗御容欲其近陵寢也宫成賜名㑹聖改訾王山為鳯臺山自是祖宗山陵成皆奉安於宫中蘇子瞻神宗山陵曲赦文云敞鳯臺之仙宇粲龜洛之仁祠鳯臺以山名也宣祖初𦵏今京城南既遷陵寢遂以其地建奉先寺仍為别殿嵗時奉祠宣祖昭憲太后其後祖宗山陵遂皆即京師寺宇為殿如奉先故事興國開先殿以奉太祖啟聖院永隆殿以奉太宗慈孝崇真殿以奉真宗普安殿以奉元徳皇后元豐間建景靈宫於是皆奉迎以置原廟自奉先而下皆廢普安亦元徳皇后􅑼宫舊地也咸平中以侍讀侍講班秩未崇乃命楊徽之為翰林侍讀學士邢昺為侍講學士班翰林學士下講讀置學士自此始其後昺以老請補外真宗以其久在講席使以本職知曺州而張文節公罷參知政事知天雄軍改翰林侍讀學士於是講讀學士始為兼職得外任慶厯後凡自翰林學士出者例皆換侍讀學士遂為故事考異咸平二年命楊徽之夏侯嶠吕文仲為翰林侍讀學士此止載楊徽之未盡也云講讀學士始為兼職非兼也趙中令為相李處耘為樞宻使處耘之女為中令子婦並居二府不避姻家皇祐中文潞公為相程康肅為樞宻副使熙寜中王荆公為相呉正憲為樞宻副使皆不避江南李煜既降太祖嘗因曲燕問聞卿在國中好作詩因使舉其得意者一聯煜沉吟久之誦其詠扇云揖讓月在手動揺風滿懐上曰滿懐之風却有多少他日復燕煜顧近臣曰好一箇翰林學士咸平三年王魏公知舉數日即院中拜同知樞宻院事當時以為科舉盛事余紹聖試禮部時鄧安恵公温伯以翰林學士承㫖知舉亦就拜尚書右丞時試已第二塲鄧公自㕔事上馬揚鞭左右揖諸生而去自魏公後繼之者惟鄧公也呉越錢俶初來朝將歸朝臣上疏請留勿遣者數十人太祖皆不納曰無慮俶若不欲歸我必不肯來放去適可結其心及俶辭力陳願奉藩之意太祖曰盡我一世盡你一世乃出御封一匣付之曰到國開視道中勿發也俶載之而歸日焚香拜之既至錢塘發視乃羣臣請留章疏俶覽之泣下曰官家獨許我歸我何可負恩及太宗即位以盡一世之言遂謀納土宼萊公性豪侈所臨鎮燕㑹常至三十醆必盛張樂尤喜柘枝舞用二十四人每舞連數醆方畢或謂之柘枝顛始罷樞宻副使知青州太宗眷之未衰數問左右宼準在青州樂否如是一再有揣帝意欲復用者即曰陛下思準不少忘聞準日置酒縦飲未知亦思陛下否上雖少解然明年卒召為參知政事祖宗用人之果不使細故讒人得乗間如此林文節連為開封府南省第一廷試皆屬以魁選仁宗亦遣近璫伺其程文畢先進呈時試民監賦破題云天監不逺民心可知比至上前一近侍傍觀忽吐舌盖惡其語忌也仁宗由是不樂亟付考官依格考校考官之意不敢置之上等入第三甲而得章子平卷子破題云運啟元聖天臨兆民上幸詳定幕次即以進呈上曰此祖宗之事朕何足以當之遂擢為第一
