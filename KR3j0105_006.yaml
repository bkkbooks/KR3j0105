body:
  text: 石林燕語卷六宋葉夢得撰宇文紹奕考異節度使旌節門旗二龍虎旌一節一麾槍二豹尾二凡八物旗以紅繒為之九幅上為塗金銅龍頭以揭旌加木盤節以金銅葉為之盤三層加紅絲為旄麾槍亦施木盤豹尾以赤黃布畫豹文皆以髹漆為杠文臣以朱武臣以黑旗則綢以紅繒節及麾槍則綢以碧油故謂之碧油紅斾受賜者藏於公宇私室皆别為堂號節堂每朔望之次日祭之號衙日唐制有六纛今無有也殿前司與侍衛司馬軍步軍為三衙其實兩司而侍衛司都指揮使外又分置馬步軍都指揮使爾殿前司亦參馬步軍而總於都指揮使故殿前司都指揮使副都虞候侍衛親軍都指揮使副都虞候與馬軍步軍都指揮使副都虞候兩司三衙合十二員分天下兵而領之此祖宗制兵之大要也始唐制有十二衛兵後又有六軍十二衛兵為南衙漢之南軍也六軍為北衙漢之北軍也末年常以大臣一人總之如崔允判六軍十二衛是也都指揮使本方鎮軍校之名自梁起宣武軍乃以其鎮兵因仍舊號置在京馬步軍都指揮使而自將之蓋於唐六軍諸衛之外别為私兵至後唐明宗遂改為侍衛親軍以康義誠為馬步軍都指揮使秦王從榮以河南尹為大元帥典六軍此侍衛司所從始也及從榮以六軍反入宫義誠顧望不出兵而侍衛馬軍都指揮使朱宏寶擊敗之其後遂不廢殿前軍起於周世宗是時太祖為殿前司都虞候初詔天下選募壯士送京師命太祖擇其武藝精髙者為殿前諸班而置都㸃檢位都指揮使上太祖實由此受禪見於國史歐陽文忠公為五代史號精詳乃云不知其所始蓋考之未詳也自有兩司六軍諸衛漸廢今但有其名則兩司不獨為親軍而已天下之兵柄皆在焉其權雖重而軍政號令則在樞密院與漢周之間史宏肇之徒為之者異矣此祖宗之微意非前世所可及也馬數嵗者以齒唐人多謂隴右人為張萬嵗諱萬嵗為太僕卿掌馬政三十餘年恩信行於隴右故也亦未必然他畜不計年惟馬之壯老人所欲知而無以驗其實必自其齒觀之則以嵗為齒理固宜爾也考異曲禮齒路馬周禮馬質書其齒毛春秋傳馬之齒長矣則馬數嵗者以齒非自唐始也唐制户部度支各以本司郎中侍郎判其事蓋户部掌納度支掌出謂常賦常用也又别置鹽鐡轉運使以掌山澤之入與督漕挽之事中世用兵因以宰相領其職乾符後改置租庸使以總之至後唐孔謙暴斂明宗誅謙遂罷使額以鹽鐵户部度支分為三司而以大臣一人總判號曰判三司未幾張延朗復請置三司使乃就命延朗班宣徽使之下本朝因其名故三司使權常亞宰相考異肅宗始以第五琦為鹽鐵使後劉晏始兼鹽鐵轉運使晏為相充使如故非其初户部度支之外便别有此等使名也租庸使自開元十一年有之永泰元年並停然鹽鐵轉運使則如故非乾符後始改置租庸使而租庸使亦非總户部度支之職也蓋自五代史張延朗𫝊失之此既承誤又甚爾梁始復置租庸使則三司之職皆總之矣國朝既以緋紫為章服故官品未應得服者雖燕服亦不得用紫蓋自唐以來舊矣太平興國中李文正公昉嘗舉故事請禁品官緑袍舉子白紵下不得服紫色衣舉人聽服皂公吏工商伎術通服皂白二色至道中弛其禁今胥吏寬衫與軍伍窄衣皆服紫沿習之久不知其非也考異太平興國七年詔詳定車服之制李昉等奏中外官及舉人不得緋緑白袍內服紫仍許通服皂衣白袍非李公自為此請也祥符中始建龍圖閣以藏太宗御集天禧初因建天章夀昌兩閣於後而以天章藏御集虛夀昌閣未用慶歷初改夀昌為寶文仁宗亦以藏御集二閣皆二帝時所自命也神宗顯謨閣哲宗徽猷閣皆後追建之惟太祖英宗無集不為閣大慶殿初名乾元太平興國祥符中皆因火改為朝元天安景祐中方改今名有龍墀沙墀凡正旦至大朝會策尊號則御焉郊祀大禮則駕宿於殿之後閣百官為次宿於前之兩廊皇祐初始行明堂之禮又以為明堂仁宗御篆明堂二字每行禮則旋揭之事已復去文德殿在大慶殿之西少次舊曰端明後改文明祥符中因火再建易今名紫宸殿在大慶殿之後少西其次又為垂拱殿自大慶殿後紫宸垂拱之兩間有柱廊相通每月視朝則御文德所謂過殿也東西閣門皆在殿後之兩旁月朔不過殿則御紫宸所謂入閣也月朔與誕節郊廟禮成受賀契丹辭見亦皆御紫宸文德遇受冊發冊明堂宣赦亦御而不常用宣麻不御殿而百官即庭下聽之紫宸不受賀而拜表稱賀則於東上閣門國忌未赴景靈宫先進名奉慰則於西上閣門亦就庭下拜而授閣門使蓋以閣不以殿也惟垂拱為日御朝之所集英殿舊大明殿也明道中改今名每春秋大燕皆在此太祖嘗御策制科舉人故後為進士殿試之所其東廊後有樓曰升平舊紫雲樓也每大燕則宫中登而觀焉皇儀殿舊名滋福咸平太宗明德皇后居之以為萬安宫后崩復舊明道中改今名故常廢而不用以為治后喪之所熙寧中蘇子容判審刑院知金州張仲宣坐枉法贓論當死故事命官以贓論死皆貸命杖脊黥配海島蘇請曰古者刑不上大夫可殺則殺仲宣五品雖有罪得乘車今杖而黥之使與徒𨽻為伍得無重汚多士乎乃詔免杖黥止流嶺外自是遂為例考異當云官五品時法官援李希輔例請貸命杖脊黥配海島蘇言希輔仲宣均為枉法仲宣止係違命視希輔有間上令免决黥之蘇又奏不可曰古者刑不上大夫仲宣官五品今貸死而黥之使與徒𨽻為伍雖其人無可矜所重者汚辱衣冠耳遂免杖黥流嶺外非故事皆貸命杖黥配海島也又先已免杖次乃免黥皇祐初丁文簡公罷參知政事初除觀文殿學士以易紫宸之名而已其後加大學士以命賈文元始詔非嘗任宰相不除觀文殿大學士遂為宰相職名熙寧間韓康公自陜西宣撫使失律以本官罷相是嵗明堂恩復觀文殿學士而不加大學士自是宰相不以美罷率止除觀文殿學士而王子純以熙河功王樂道以宫僚雖非宰相亦除蓋異恩也然皆兼端明殿龍圖閣學士國朝狀元為相者四人吕文穆公王文正公李文定公宋元憲公文穆登第十二年拜文正二十一年文定二十九年元憲二十七年文正文定皆再入而文穆三入為尤盛文正初擕行卷見薛簡肅公其首篇早梅云如今未說和羮事且向百花頭上開簡肅讀之喜曰足下殆將作狀元了做宰相耶王伯庸名堯臣榜韓魏公第二趙康靖公第三嘉祐末魏公為相康靖為參知政事伯庸雖先罷去而魏公與康靖同在政府當時號為盛事熙寧末王荆公相韓康公王禹玉為參知政事三人亦皆同年仍在第甲連名禹玉第一康公第二荆公第三荆公再入仍與康公並相尤為難得時陸子履作詩云須信君王重儒術一時同榜用三人中丞侍御史上事臺屬皆東西立於㕔下上事官拜㕔已即與其屬揖而不聲喏謂之啞揖以次升階上事官據中坐其屬後列坐於兩旁上事官判案三道後皆書曰記咨而後引百司人吏立於庭臺吏自㕔上厲呼曰咄則百司人吏聲喏急趨而出謂之咄散然後屬官始再展狀如尋常參謁之儀始相與交談前此蓋未嘗語也案後判記咨恐猶是方鎮憲銜時沿襲故事記謂記室咨謂咨議不知啞揖咄散為何義然至今行之不改國初天下始定更崇文士自殿試親放榜狀元往往遂見峻用吕文穆公太平興國七年登科八年已為參知政事李文正昉乃座主于時為相與文穆同在二府後五年文正罷文穆遂代為相李文定公景德二年登科天禧元年為參知政事後三年為相距登第亦才十六年登第時寇萊公已為相馮魏公已為𠫭知政事後亦代萊公為相而魏公尚樞密使其後王文正公以咸平五年登科大中祥符九年為𠫭知政事乾興元年為相距登第二十一年登第時馮魏公為同知樞密院事王冀公為參知政事亦代魏公為相而冀公方自江寧再入為首相自是無復繼者故事外官除館職如祕閣校理直祕閣者必先移書在省職事官叙同僚之好已乃専遣人持錢及酒殽珍饌即館設盛㑹燕同僚請官長為之主以代禮上之㑹各隨其力之厚薄甚有費數百千者就京師除者則即館上事㑹亦如之自崇寧以來外官除館職者既多此禮寖廢宣和後雖書局官亦預館職至百餘員故遂廢不講崇寧初許天啓自陜西漕對除直祕閣用故事入館上事以漕司騶從傳導至道山堂坐吏無一出見者館職亦各居直舍不相誰何天啓久之索馬而去人傳以為笑國朝知制誥必召試而後除唐故事也歐陽文忠記不試而除者惟三人陳文惠楊文公與文忠此乃異禮自是繼之者惟元祐間蘇子瞻一人而已近例凡自起居舍人除中書舍人者皆不試蓋起居舍人遇中書舍人闕㦯在告則多權行辭為已試之矣故不再試遂為故事尚書省樞密院劄子體制各不同尚書年月日宰相自上先書有次相則重書共一行而左右丞于下分書别為兩行蓋以上為重樞密知院自下先書同知以次重書于上簽書亦然蓋以下為重而不别行唐誥敕宰相復名者皆不出姓惟單名則出姓蓋以為宰相人所共知不待書姓而見余多見人告身類如此國朝宰相雖單名亦不出姓他執政則書異宰相之禮也宰相監修國史止用敕不降麻世皆言自趙韓王以來失之然韓王初相時范魯公三相俱罷中書無人乃以太宗押敕則雖相亦是敕除未嘗降麻蓋國初典禮猶未備也考異舊有誥文又有敕仁宗封夀春郡王禮儀院言皇子誥敕請令閣門進納宫中給賜王元之代王侍郎辭官表云伏蒙聖慈賜臣官誥一道敕牒一道特授參知政事陳堯叟自樞密使罷為右僕射命其子賫誥牒賜之司馬溫公辭副密云乞收還敕誥其他證據甚多此特舉其顯然者近世誥敕不並行豈得謂國初宰相亦敕除未嘗降麻乎趙韓王拜相麻制見實録故事雜學士得服金帶熙寧初薛師正以天章閣待制權三司使上以為能詔賜金帶非學士而賜帶自此始自官制行以給事中中書舍人為兩省屬官皆得預聞兩省之事初舍人既沿舊制差除有未審當皆得直封還詞頭而給事中有所駮正則先使詣執政禀議有異同然後繳奏以聞韓儀公為給事中建言兩省事體均一不應一得直行一須禀議遂詔如舍人然舍人於中書事皆得於檢後通書押而給事中則但書録黃而已舒信道為給事中復以為言王文恭為相時以白上神宗曰造令與行令不同職分宜别給事中不當書草遂著為令迄今以為定制也祖宗時選人初任薦舉本不限以成考景祐中栁三變為睦州推官以歌辭為人所稱到官才月餘吕蔚知州事即薦之郭勸為侍御史因言三變釋褐到官始踰月善狀安在而遽薦論因詔州縣官初任未成考不得舉後遂為法故事生日賜禮物惟親王見任執政官使相然亦無外賜者元豐中王荆公罷相居金陵除使相辭未拜官止特進神宗特遣內侍賜之蓋異恩也考異使相雖在外亦賜范蜀公內制有賜使相判河陽富弼生日禮物口宣云爰兹震夙之旦故有匪頒之常王荆公熙寧七年以觀文殿大學士吏部尚書知江寧詔生日依在外使相例取賜此云使相無外賜者又云元豐中又云居金陵又云除使相辭未拜官止特進皆非荆公熙寧九年再罷相除使相判江寧尋改集禧觀使元豐元年正月除大觀文三年九月官制行改特進天聖前諸路使者舉薦未有定限選人止用四考改官然是時吏部選人磨勘嵗才數十人而已慶歷以後增為六考知州等薦吏部皆視屬邑多寡裁為定數於是當薦舉者常以應格充數為意遂數倍於前治平中吏部待次引見人至二百五十餘人賈直儒為中司嘗言其冗時但下詔申戒中外務在得人不必滿所限之數然竟不能革也太祖初罷范魯公三相而獨拜趙韓王乃置參知政事二員為之副以薛文惠公居正吕文穆公餘慶為之執政官自此始不宣制不知印不押班不預奏事但奉行制書而已韓王獨相十年後以權太盛恩遇稍替始詔參知政事與宰相更知印押班奏事以分其權遂為故事初唐至德中宰相分直政事堂人知十日貞元後改為輪日故參用之祖宗時執政私第接賔客有數庶官幾不復可進自王荆公欲廣收人材於是不以品秩髙卑皆得進謁然自是不無夤緣干求之私進見者既不敢廣坐明言其情往往皆於送客時羅列於廡下以次留身叙陳而退遂以成風執政既日接客至休日則皆杜門不復通閽吏亦以榜揭於門曰假日不見客故事見執政皆著靴不出笏然客次相與揖則皆用笏京師士人因言㕔上不說話而廡下說話假日不見客而非假日見客堂上不出笏而客次出笏謂之三拗祖宗故事宰相去位例除本官稍優則進官一等或易東宫三少惟趙韓王以開國舊臣且相十年故以使相罷蓋異恩也自是迄太宗真宗世皆不易舊制天聖初馮魏公以疾辭位始除武勝軍節度使宰相建節自魏公始明道末吕申公罷仁宗眷之厚始復加使相蓋自韓公以來申公方繼之其後王文惠陳文惠罷日相繼除遂以為例宰相除使相自申公始景祐末王沂公罷相除資政殿大學士判鄆州宰相除職自沂公始至皇祐賈文元罷除觀文殿大學士自是遂以為例蓋自非降黜皆建節或使相為優恩加職名為常例迄今不改也真宗景德中既置資政殿大學士授王冀公班翰林承㫖上一時以為殊寵祥符初向文簡公以前宰相再入為東京留守復加此職自是迄天聖末二十餘年不以除人明道元年李文定公知河陽召還始再命之景祐四年王沂公罷相復除三十年間除三人而皆前宰相也宋宣獻公罷參知政事仁宗眷之厚因加此職自冀公後非宰相而除者惟宣獻一人而已時謝希深當制云有國極資望之選今才五人儒者兼翰墨之華爾更九職當時頗稱之宣獻嘗歷龍圖閣學士端明殿學士再為翰林學士三為侍讀學士而後除資政殿大學士至是併為九也學士院舊制自侍郎以上辭免除授賜詔皆留其章中書而尚書省略具事因降劄子下院使為詔而已自執政而上至於節度使相用批答批答之制更不由中書直禁中封所上章付院今降批表院中即更用紙連其章後書辭併其章賜之此其異也辭既與章相連後書省表具之字必長作表字傍一瞥通其章階位上過謂之抹階若使不復用舊銜之意相習已久莫知始何時龍武羽林神武各分左右所謂六軍也每軍有統軍而無上將軍蓋唐貞元之制以比六尚書用待藩鎮罷還無職事而奉朝請者國朝因之咸平初楚王元佐加官有司誤以為左羽林上將軍後遂為例治平三年始詔今後六軍加官不除上將軍所以釐正其失也天策上將唐官也初太宗破王世充竇建德髙祖以其功大其官號不足稱乃加是名位三公上開府終唐世未嘗更命人梁更為天策上將軍以命馬殷亦開府祥符八年楚王元佐久疾以皇兄之寵故採唐舊典授之結銜在功臣上而不開府其後荆王元儼薨因以為贈官考異唐太宗為皇太子即罷天策府自不應更有府官也唐宗正卿皆以皇族為之本朝踵唐故事而止命同姓慶歷初始置大宗正司以北海郡王允弼為知大宗正事其後相承皆以宗室領治平元年英宗以宗子數倍多於前乃命增置同知大宗正事一員亦以懷州團練使宗惠為之迄今以為故事熙寧三年復置丞二員而命以外官繼照堂真宗尹京日射堂也祥符二年因臨幸賜名資善堂仁宗肄學之所也祥符八年置舊在元符觀南天禧初徙今御厨北國朝宰相執政未有兼東宫職事者天禧末仁宗初立為皇太子因命宰相丁謂馮拯兼少師少傅樞密使曹利用兼少保而任中正王曾為參知政事錢惟演為樞密副使皆兼賔客前此所無也謂等因請師傅十日一赴資善堂賔客以下隻日互陪侍講從之國朝以史館昭文館集賢院為三館皆寓崇文院其實别無舍但各以庫藏書列於廊廡間爾直館直院謂之館職以他官兼者謂之貼職元豐以前凡狀元制科一任還即試詩賦各一而入否則用大臣薦而試謂之入館官制行廢崇文院為祕書監建祕閣於中自少監至正字列為職事官罷直館直院之名而書庫仍在獨以直祕閣為貼職之首皆不試而除蓋特以為恩數而已
