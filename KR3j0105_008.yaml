body:
  text: 石林燕語卷八宋葉夢得撰宇文紹奕考異仁宗留意科舉由是禮闈知舉任人極艱天聖五年春榜王沂公當國欲差知舉官從臣中無可意者因以劉中山筠為言時劉知潁州仁宗即命驛召之是嵗廷試王文安公堯臣第一韓魏公第二趙康靖公槩第三慶歷中劉原父廷試考第一會王伯庸以翰林學士為編排官原父內兄也以嫌自列或言髙下定於考試官編排第受成而甲乙之無預與奪伯庸猶力辭仁宗不得已以為第二而以賈直儒為魁舊制執政子弟多以嫌不敢舉進士有過省而不敢就殿試者蓋時未有糊名之法也其後法制既備有司無得容心故人亦不復自疑然至和中沈文通以太廟齋郎廷試考第一大臣猶疑有官不應為遂亦降為第二以馮當世為魁富公以茂材異等登科後召試館職以不習詩賦求免仁宗特命試以策論後遂為故事制科不試詩賦自富公始至蘇子瞻又去策止試論三篇熙寧初罷制舉其事皆廢李文定公在場屋有盛名景德二年預省試主司皆欲得之以置髙第已而竟不在選主司意其失考取所試卷覆視之則以賦落韻而黜也遂奏乞特取之王魏公時為相從其請既廷試遂為第一考異此説據范蜀公東齋記事然景德二年乃畢文簡寇萊公為相王魏公參政此云王魏公時為相非也端拱初宋白知舉取二十八人物論喧然以為多遺材詔復取落下人試於崇政殿於是再取九十九人而葉齊猶擊登聞鼓自列朝廷不得已又為覆試頗惡齊嚚訟考官賦題特出一葉落而天下秋凡放三十一人而齊仍在第一國朝取士猶用唐故事禮部放榜栁開少學古文有盛名而不工為詞賦纍舉不第開寶六年李文正昉知舉被黜下第徐士亷擊鼓自列詔盧多遜即講武殿覆試於是再取宋準而下二十六人自是遂為故事再試自此始然時開復不預多遜為言開英雄之士不工篆刻故考較不及太祖即召對大恱遂特賜及第唐禮部試詩賦題不皆有所出或自以意為之故舉子皆得進問題意謂之上請本朝既增殿試天子親御殿進士猶循用禮部故事景祐中稍厭其煩瀆詔御藥院具試題書經史所出模印給之遂罷上請之制元豐五年黃冕仲榜唱名有暨陶者主司初以洎音呼之三呼不應蘇子容時為試官神宗顧蘇蘇曰當以入聲呼之果出應上曰卿何以知為入音蘇言三國志吳有暨艷陶恐其後遂問陶鄉貫曰崇安人上喜曰果吳人也時暨自闕下一畫蘇復言字下當從旦此唐避睿宗諱流俗遂誤弗改耳故事殿試唱名編排官以試卷列御座之西對號以次拆封轉送中書侍郎即與宰相對展進呈以姓名呼之軍頭司立殿陛下以次傳唱大觀三年賈安宅榜林彥振為中書侍郎有甄好古者彥振初以真呼鄭達夫時為同知樞密在旁曰此乃堅音欲以沮林即以堅呼三呼不出始以真呼即出彥振意不平有忿語達夫摘以為不恭林坐貶唐末禮部知貢舉有得程文優者即以已登第時名次處之不以甲乙為髙下也謂之傳衣鉢和凝登第名在十三後得范魯公質遂處以十三其後范登相位官至太子太傅封國於魯與凝皆同世以為異也宋莒公兄弟居安州初未知名會夏英公謫知安州二人以文贄見大稱賞之遂聞于時初試禮部劉子儀知舉擢景文第一余曽叔祖司空第二莒公第三時諒暗不廷試暨奏名明肅太后曰弟何可先兄乃易莒公第一而景文降為第十是榜上五名莒公與曽魯公既為相髙文莊鄭文肅與曽叔祖皆聨名景文王內翰洙張侍讀瓌郭龍圖稹皆同在第一甲故世稱劉子儀知人蘇子瞻自在場屋筆力豪騁不能屈折于作賦省試時歐陽文忠公鋭意欲革文弊初未之識梅聖俞作考官得其刑賞忠厚之至論以為似孟子然中引臯陶曰殺之三堯曰宥之三事不見所據亟以示文忠大喜往取其賦則已為他考官所落矣即擢第二及放榜聖俞終以前所引為疑遂以問之子瞻徐曰想當然耳何必須要有出處聖俞大駭然人已無不服其雄俊熙寧以前以詩賦取士學者無不先遍讀五經余見前輩無科名人亦多能雜舉五經蓋自幼習之故終老不忘自改經術人之教子者往往便以一經授之他經縱讀亦不能精教者亦未必皆讀五經故雖經書正文亦率多遺誤嘗有教官出易題云乾為金坤亦為金何也舉子不免上請則是出題時偶檢福建本坤為金字本謬忘其上兩點也又嘗有秋試問井卦何以無彖亦是福建本所遺唐以前凡書籍皆寫本未有摹印之法人以藏書為貴不多有而藏者精於讎對故往往皆有善本學者以傳録之艱故其誦讀亦精詳五代時馮道奏請始官鏤六經板印行國朝淳化中復以史記前後漢付有司摹印自是書籍刋鏤者益多士大夫不復以藏書為意學者易於得書其誦讀亦因滅裂然板本初不是正不無訛誤世既一以板本為正而藏本日亡其訛謬者遂不可正甚可惜也余襄公靖為祕書丞嘗言前漢書本謬甚詔與王原叔同取祕閣古本𠫭校遂為刋誤三十卷其後劉原父兄弟兩漢皆有刋誤余在許昌得宋景文用監本手校西漢一部末題用十三本校中間有脫兩行者惜乎今亡之矣世言雕板印書始馮道此不然但監本五經板道為之爾栁玭訓序言其在蜀時嘗閲書肆云字書小學率雕板印紙則唐固有之矣但恐不如今之工今天下印書以杭州為上蜀本次之福建最下京師比嵗印板殆不減杭州但紙不佳蜀與福建多以柔木刻之取其易成而速售故不能工福建本幾遍天下正以其易成故也監本禮記月令唐明皇刪定李林甫所注也端拱中李至判國子監嘗請復古本下兩制館職議胡旦等皆以為然獨王元之不同遂寢後復數有言者終以朝廷祭祀儀制等多本唐注故至今不能改而私本即用鄭注太宗當天下無事留意藝文而琴棋亦皆造極品時從臣應制賦詩皆用險韻往往不能成篇而賜兩制棋勢亦多莫究所以故不得已則相率上表乞免和訴不曉而已王元之嘗有詩云分題宣險韻翻勢得仙碁又云恨無才應副空有表虔祈蓋當時事也蘇子瞻嘗稱陳師道詩云凡詩須做到衆人不愛可惡處方為工今君詩不惟可惡却可慕不惟可慕却可妬白樂天詩三杯藍尾酒一楪膠牙餳唐人言藍尾多不同藍字多作啉云出於侯白酒律謂酒巡匝末坐者連飲三杯為藍尾蓋末坐逺酒行到常遲故連飲以慰之以啉為貪婪之意或謂啉為燣如鐵入火貴出其色此尤無稽則唐人自不能曉此義也蘇參政易簡登科時宋尚書白為南省主文後七年宋為翰林學士承旨而蘇相繼入院同為學士宋嘗贈詩云昔日曽為尺木階今朝真是青雲友歐陽文忠亦王禹玉南省主文相距十六年亦同為學士故歐公詩有喜君新賜黃金帶顧我今為白髮翁之句二事誠一時文物之盛也東漢以來九卿官府皆名曰寺與臺省並稱鴻臚其一也本以待四夷賔客故摩騰竺法蘭自西域以佛經至舍於鴻臚今洛中白馬寺摩騰真身尚在或云寺即漢鴻臚舊地摩騰初來以白馬負經既死尸不壞因留寺中後遂以為浮屠之居因名白馬今僧居槩稱寺蓋本此也摩騰真身至今不枯朽漆棺石室扃鎖甚固藏其鑰於府廨有欲觀者旋請鑰秉燭乃可詳視然楊衒之洛陽伽藍記載當時經函放光事而不及摩騰不可解衒之元魏時人也漢太皇太后稱長信宫皇太后稱長樂宫皇后稱長秋宫本朝不為定制皇后定居坤儀殿太皇太后皇太后遇當推尊則改築宫易以嘉名始遷入百官皆上表稱賀及賀兩宫國初以供奉官左右班殿直為三班後有殿前承旨班端拱後分供奉官為東西又置左右侍禁借職皆領於三班院而仍稱三班不改其初三班例員止三百或不及天禧後至四千二百有餘蓋十四倍元豐後至一萬一千六百九十合宗室八百七十總一萬二千五百六十視天禧又兩倍有餘以出入籍較之熙寧八年入籍者嵗四百八十有餘其死亡退免者不過二百此所以嵗增而不已也右選如此則左選可知矣元昊叛王師數出不利仁宗頗厭兵吕文靖公遂有赦罪招懷之意而范文正公韓魏公持不可欲經營服之龎潁公知延州乃密諭潁公令致意於昊時昊用事大臣野利旺榮適遣牙校李文貴來潁公留之未遣因言敵方驟勝若中國先遣人必偃蹇不受命不若因其人自以己意令以逆順禍福歸告乃遣文貴還巳而旺榮及其類曹偶四人果皆以書來然猶用敵國禮公以為不遜未敢答以聞朝廷幸其至趣使為答書稱旺榮等為太尉且曰元昊果肯稱臣雖仍其僣名可也潁公復論僣名豈可許太尉天子上公若陪臣而得稱則元昊安得不僣旺榮等書自稱寧令謨此其國中官號姑以此復之則無嫌乃徑為答書如是往返踰年元昊遂遣其臣伊州刺史賀從朂入貢稱男邦面令國兀卒郎霄上書父大宋皇帝潁公覽之謂其使曰天子至尊荆王叔父猶奉表稱臣若主可獨言父子乎從朂請復歸議朝廷從其策元昊遂卒稱臣寶元康定間元昊初叛契丹亦以重兵壓境時承平久三路正兵寡弱乃詔各籍其民不問貧富三丁取一為鄉弓手已而元昊寇陜西劉平石元孫等敗沒死者以萬計正兵益少乃盡以鄉弓手刺面為保捷指揮正軍河東河北事宜稍緩但刺其手背號義勇治平間諒祚復謀入寇議者數請為邊備韓魏公當國遂委陜西提刑陳述古準寶元康定故事復籍三丁之一為義勇蓋以陜西視兩河初無義勇故也司馬君實知諫院力陳其不可言甚切至且謂陜西保捷即兩河義勇不應已籍而再籍章六上訖不從蓋魏公主之也黃河慶歷後初自橫隴稍徙趨德博後又自商胡趨恩冀皆西流北入海朝廷以工夫大不復塞至和中李仲昌始建議開六塔河引注橫隴復東流周沆以天章閣待制為河北都轉運使詔遣中官與沆同按視沆言今河面二百步而六塔渠廣四十步必不能容茍行之則齊與博德濵棣五州之民皆為魚矣時賈文元知北京韓康公為中丞皆不主仲昌議而富韓公為相獨力欲行之康公至以是擊韓公然北流既塞果決齊博等州民大被害遂竄仲昌嶺南議者以為韓公深恨太宗北伐髙瓊為樓船戰棹都指揮使部船千艘趨雄州元昊初臣龎潁公自延州入為樞密副使首言關中苦餽餉請徙沿邊兵就食內地議者爭言不可以為敵初伏情偽難測未可遽弛備獨公知元昊已困必不能遽敗盟卒徙二十萬人後為樞密使復言天下兵太冗多不可用請汰其罷老者時論紛然尤以為必生變公曰有一人不受令臣請以身坐之仁宗用其言遂汰八萬人夏文莊韓魏公皆自樞密副使出再召為三司使賈文元為崇政殿説書久之仁宗欲以為侍講而難於驟用乃特置天章閣侍講天章有侍講自此始然後亦未嘗復除人考異時以崇政殿説書賈昌朝王宗道趙希言並兼天章閣侍講非専為賈設也後髙若訥楊安國王洙林瑀趙師民曾公亮錢象先盧士宗胡瑗吕公著傅求常秩陳襄吕惠卿等皆為天章閣侍講云後亦未嘗復除人非也元豐初詔修仁宗英宗史王禹玉以左僕射為監修官始成二帝紀具草進呈神宗內出手詔賜禹玉等曰兩朝大典雖為重事以卿等才學述作之固已比迹班馬矣朕之淺陋何所加損乎其如擬進草緒成之蓋上尊祖宗之意非故事也其後史成特詔給舍侍郎以上學士中丞及觀察使以上曲燕於垂拱殿亦非故事也國朝宰相自崇寧以前乾德二年范質王溥魏仁浦罷趙普相開寶六年罷獨相者十年雍熙二年宋琪罷李昉在位端拱元年罷獨相者四年淳化元年趙普罷吕蒙正在位獨相者踰年景德三年寇準罷王旦相祥符五年向敏中相旦獨相者七年天聖七年王曾罷吕夷簡在位明道元年張士遜復相夷簡獨相者三年皇祐三年宋庠文彥博罷龎籍相獨相者三年元祐九年吕大防罷章惇相七年罷獨相者七年七朝獨相者七人惟趙韓王十年其次王魏公章申公七年為最久云元豐中蹇周輔自户部侍郎知開封府止除寶文閣待制而李定自户部侍郎知青州除龍圖閣直學士二例不同定或以久次也紹聖初彭器資自權尚書韓持正自侍郎出知成都府皆除寶文閣直學士兩人皆辭行即復以待制為州蓋成都故事須用雜學士而權尚書真侍郎皆止當得待制也范忠宣元祐初自直龍圖閣知慶州進天章閣待制即召為給事中未幾遷吏部尚書辭免未報拜同知樞密院告自中出特令不過門下省公力辭臺諫亦有以為言不聼遂自同知拜相前輩進用之速未有如此考異范知慶州除待制召為給事中皆元豐八年云元祐初非也時以安燾知樞范同知而給事中封駮燾敕不下詔不送給事中書讀燾辭免從之除命復送給事中書讀云告自中出特令不過門下省非也范元祐元年六月同知三年四月相宋琪自外郎一嵗四遷至作相向敏中自外郎同知樞才百餘日云前輩進用之速未有如范者亦非也慶歷二年富鄭公知諫院吕申公章郇公當國時西事方興鄭公力論宰相當通知樞密院事二公遂皆加判樞密院已而以判為太重改兼樞密使五年二公罷賈文元陳恭公繼相遂罷兼使竇懷貞以尚書右僕射兼御史大夫詔軍國重事宜共平章元祐初以文潞公為平章軍國重事吕申公為平章軍國事遂入銜或以為用懷貞故事國史院初開史官皆賜銀絹筆墨紙已開而續除者不賜唐都雍洛陽在關東故以為東都本朝都汴洛陽在西故以為西都皆謂之兩京祥符七年真宗謁太清宫于亳州還始建應天府為南京仁宗慶歷二年契丹會兵幽州遣使蕭英劉六符來求關南北地始建大名府為北京從官狨座唐制初不見本朝太平興國中始禁工商庶人許乘烏漆素鞍不得用狨毛暖座天禧中始詔兩省五品宗室將軍以上許乘狨毛暖座餘悉禁則太平興國以前雖工商庶人皆得乘天禧以前庶官亦皆得乘也按此條已見第三卷惟中數語詳略互異今並存之故事建州嵗貢大龍鳯團茶各二斤以八餅為斤仁宗時蔡君謨知建州始别擇茶之精者為小龍團十斤以獻斤為十餅仁宗以非故事命劾之大臣為請因留而免劾然自是遂為嵗額熙寧中賈青為福建轉運使又取小團之精者為密雲龍以二十餅為斤而雙袋謂之雙角團茶大小團袋皆用緋通以為賜也密雲獨用黃蓋専以奉玉食其後又有為瑞雲翔龍者宣和後團茶不復貴皆以為賜亦不復如向日之精後取其精者為􅙧茶嵗賜者不同不可勝紀矣考異君謨為福建轉運使非知建州也始進小龍團凡二十餅重一斤此云斤為十餅非也慶歷初吕許公在相位以疾甚求罷仁宗疑其辭疾欲親視之乃使乘馬至殿門坐椅子輿至殿陛命其子公弼掖以登既見信然乃許之前無是禮也考異吕傳云命內侍取兀子輿以前
