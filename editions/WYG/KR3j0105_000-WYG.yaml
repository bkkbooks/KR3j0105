body:
  text: 提要石林燕語十卷雜家類三雜說之屬臣等謹案石林燕語十卷宋葉夢得撰夢得有春秋傳已著録夢得為紹聖舊人徽宗時嘗司綸誥於朝章國典夙所究心故是書纂述舊聞皆有闗當時掌故於官制科目言之尤詳頗足以補史傳之闕與宋敏求春明退朝録徐度却掃編可相表裏陳振孫書録解題謂其書成于宣和五年然其中論館伴遼使一條建炎三年又論宰相一條謂自元祐五年至今紹興六年則書成於南渡之後振孫之説未核矣惟夢得當南北宋間戈甲倥偬圖籍散佚或有記憶失真考據未詳之處故汪應辰嘗作石林燕語辨而成都宇文紹奕案紹奕始末無考嘉定中有樞宻使宇文紹節疑其昆弟亦作考異以糾之應辰之書陳振孫巳稱未見葢宋末傳本即稀儒學警悟案儒學警悟亦南宋之書不著撰人名氏間引數條與紹奕考異同散見永樂大典中然寥寥無幾難以成編惟紹奕之書尚可裒集謹蒐采考校各附夢得書本條之下雖其間傳聞年月之訛繕寫字畫之誤一一毛舉或不免有意吹求頗類劉弦之規杜預吳縝之糾歐陽修而援引舊文辨駁詳確者十之八九是一朝故事得夢得之書而梗槩具存得紹奕之書而考證益密二書相輔而行於史學彌為有裨矣又夢得之書宋槧罕覯前明有大字刋本摹印亦稀世行毛晉津逮秘書所載脱悞頗多而商濬稗海所載踳駁尤甚今併參驗諸本以永樂大典所載詳為勘校訂訛補闕以歸完善凡所釐正各附案語于下方用正俗刻之訛庶幾稍還舊觀不失其真焉乾隆四十六年三月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀葉夢得石林燕語原序宣和五年余既卜别館於卞山之石林谷稍逺城市不復更交世事故人親戚時時相過周旋嵁巖之下無與為娯縱談所及多故實舊聞或古今嘉言善行皆少日所傳於長老名流及出入中朝身所踐更者下至田夫野老之言與夫滑稽諧謔之辭時以抵掌一笑窮谷無事偶遇筆札隨輙書之建炎二年避亂縉雲歸兵火蕩析之餘井閭湮廢前日之客死亡轉徙略相半而余亦老矣洊罹變故志意銷隳平日所見聞日以廢忘因令棟更裒集為十卷以石林燕語名之其言先後本無倫次不復更整齊孔子語虞仲夷逸曰隱居放言而公明賈論公叔文子曰夫子時然後言人不厭其言子曰然夫言不言吾何敢議抑謂初無意於言而言則雖未免有言以余為未嘗言可也八月望日石林山人序
