body:
  text: 石林燕語卷二宋葉夢得撰宇文紹奕考異周官坐而論道謂之三公者非人臣也王乃天子公五等諸侯自三公而下皆卿大夫爾古者以六卿兼三公通謂之卿唐制宰相對正衙皆立而不奏事開延英奏事始得坐非尊之也蓋以其論事難於久立本朝范魯公為相當禪代之際務従謙畏始請皆立則今經筵官初皆得坐者非以其師尊之亦以講讀難久立故也太祖開寳中召王昭素講便殿太宗端拱中幸國子監召學官李覺講皆賜坐此出一時特恩非講官例也考異周官以太師太傅太保為三公論道經邦則坐而論道非謂五等諸侯也五等諸侯豈得云非人臣乎周官孤卿大夫與三公皆不同豈得云三公而下皆卿大夫乎三公不必備何必以卿兼公而通謂之卿乎周公位冢宰乃公兼卿也開寳中乃開寳元年端拱中亦端拱元年應天府藝祖肇基之地祥符七年始建為南京詔即衙城為大内正殿以歸徳為名當時雖降圖營建而實未嘗行天禧中王沂公為守始請減省舊制别為圖以進亦但報聞其後夏文莊韓忠獻張文定相繼為守有請僅能修祥輝崇禮二門而已元豐間蘓子容自南京被召還朝復以為言但請以沂公奏先修歸徳一殿約為屋百間神宗亦未暇也至今惟正門以真宗東封囬嘗駐蹕賜赦觀酺賜名重熙頒慶樓猶是雙門未嘗改作内中唯有御製詩碑亭二余為守時已將傾頽其中榛莽殆不可入也元豐官制行王禹玉為左僕射蔡持正為右僕射新省成即都堂禮上郎中員外郎迎於門外僕射拜􅈦訖升􅈦各判祥瑞案三道學士兩省官賀於􅈦上中丞尚書以下百官班於庭下東西向僕射降階就褥位直省官贊揖臺吏引中丞出班北向致辭賀復位直省吏贊拜僕射答拜退即尚書省燕侍郎給舍以上及中丞學士皆與時有司定儀制以聞禹玉等拜辭神宗以官名始正特行之自後為相者初正謝即辭例従之故惟此一舉而已元豐官制行呉雍以左司郎中出為河北都轉運使是時神宗方經營朔方有巡幸之意宻以委雍乃除直龍圖閣都司除職自此始其後文及甫自吏部員外郎出知陜府潞公在洛便養為請欲以示優禮亦除直龍圖閣郎官除職自此始皆非常例也故自是郎官出入皆未有得職者至元祐間范子竒自左司郎中除河北轉運使范純粹自右司郎中除京東轉運皆除直龍圖閣用呉雍例也元豐五年官制初行新省猶未就僕丞并六曺寓治於舊三司司農寺尚書省及三司使廨舍七月成始遷入新省掲牓曰文昌府前為都省令􅈦在中僕射􅈦分左右凡為屋一千五百八十間有奇六曺列於後東西向為屋四百二十間有奇凡二千五百二十間有奇合四千一百間有奇時首拜王禹玉蔡持正為相至元祐紹聖間二人皆貶其後追治元祐黨人吕申公司馬温公吕汲公范忠宣劉莘老皆貶免者惟蘓公一人而已故言隂陽者皆謂凡居室以後為重今僕射􅈦不當在六曺前持正請遷遂遷舊七寺監移建如唐制既那其地步欲速成將作少監李誡總其事殺其間數工亦滅裂余為祠曺郎尚及居之議者惜其壯麗不逮前也契丹既修兄弟之好仁宗初隆緒在位於仁宗為伯故明肅太后臨朝生辰正旦契丹皆遣使致書太后本朝亦遣使報之猶娣婦通書於伯母無嫌也至和二年宗真卒洪基嗣位宗真妻臨朝則仁宗之弟婦也與隆緒時異衆議每遣使但致書洪基使専達禮意其報亦如之最為得體元祐初宣仁臨朝洪基亦英宗之弟因用至和故事禮逮事父母則諱王父母不逮事父母則不諱王父母鄭氏以逮為及識當是有知之稱舊法祖父母私忌不為假元豐編勅修假寜令於父母私忌假下添入逮事祖父母者准此意謂生時祖父母尚存云爾然不當言逮事蓋誤用禮之文也原為此法者謂生而祖父母死則為不假存則為假所以别於父母也若謂逮事為及見之辭則禮云不逮父母者今遺腹子固有不及見父者矣而母則安有不及見者乎法初行安厚卿為樞宻適祖母忌祖母没時厚卿纔二嵗疑而以問禮部郎官何洵直洵直雖知法官之誤因欲遷就其説引子生三月而父名之以為天時一變為有識欲以三月為限斷過矣今士大夫凡生而祖父母存者皆告假従立法者之意也唐以宣政殿為前殿謂之正衙即古之内朝也以紫宸殿為便殿謂之上閣即古之燕朝也而外别有含元殿古者天子三朝外朝内朝燕朝外朝在王宫庫門外有非常之事以詢萬民於宫中内朝在路門外燕朝在路門内蓋内朝以見羣臣或謂之路朝燕朝以聴政猶今之奏事或謂之燕寢鄭氏小宗伯注以漢司徒府有天子以下大㑹殿為周之外朝而蕭何造未央宫言前殿則宜有後殿大㑹殿設於司徒府則為外朝而宫中有前後殿為内朝燕朝蓋去周猶未逺也唐含元殿宜如漢之大㑹殿宣政紫宸乃前後殿其沿習有自來矣方其盛時宣政蓋常朝日見羣臣遇朔望陵寢薦食然後御紫宸旋傳宣喚仗八閣宰相押之由閤門進百官隨之入謂之喚仗入閣紫宸殿言閣猶古之言寢此御朝之常制也中世亂離宣政不復御正衙立仗之禮遂廢惟以隻日常朝御紫宸而不設仗敬宗始復修之因以朔望陳仗紫宸以為盛禮亦謂之入閣誤矣唐正衙日見羣臣百官皆在謂之常㕘喚仗入閣百官亦隨以入則唐制天子未嘗不日見百官也其後不御正衙紫宸所見惟大臣及内諸司百官俟朝於正衙者傳聞不坐即退則百官無復見天子矣敬宗再舉入閣禮之後百官復存朔望兩朝至五代又廢故後唐明宗始詔羣臣每五日一隨宰相入見謂之起居時李琪為中丞以為非禮請復朔望入閣之禮明宗曰五日起居吾思見羣臣不可罷朔望入閣可復遂以五日羣臣一入見中興便殿為起居朔望天子一出御文明前殿為入閣迄本朝不改元豐官制行始詔侍従官而上日朝垂拱謂之常參官百司朝官以上每五日一朝紫宸為六參官在京朝官以上朔望一朝紫宸為朔參官遂為定制古者天子之居總言宫而不名其别名皆曰堂明堂是也故詩言自堂徂基而禮言天子之堂初未有稱殿者秦始皇紀言作阿房甘泉前殿蕭何傳言作未央前殿其名始見而阿房甘泉未央亦以名宫疑皆起於秦時然秦制獨天子稱陛下漢有魯靈光殿而司馬仲達稱曺操范縝稱竟陵王子良皆曰殿下則諸侯王漢以來皆通稱殿下矣至唐初制令惟皇太后皇后百官上疏稱殿下至今循用之蓋自唐始也其制設吻者為殿無吻不為殿矣本朝未定六參之制百官日俟朝於前殿者便殿初引班常以四色官一人立垂拱門外亢聲唱前殿不坐及宰相便殿奏事畢即復出押百官虚拜於前殿庭下而散其宰相遇奏事日髙皆不復押亦百官以序自拜於陛下而出韓魏公為相在位久遂更不押班王樂道為中丞力擊之以為不臣其言雖過然當時議者猶以無故不押班為非禮故司馬君實代樂道以辰時二刻前朝退則押班過則免遂以為例前世常患加役流法太重官有監驅之勞而配𨽻者有道路奔亡困踣之患蘓子容元豐中建議請依古置圜土取當流者治罪訖髠首鉗足晝夜居作夜則置之圜土滿三嵗而後釋未滿嵗而遇赦者不原既釋仍送本鄉譏察出入又三嵗不犯乃聴自如崇寜中蔡魯公始行之人不以為善也集賢院學士故事初不分髙下但以為名而品秩自従其官故呉正肅公以前執政資政殿大學士劉原甫以従官翰林侍讀學士皆以疾換授蓋不為要職也然在學士之列視待制則為優故元厚之以天章閣待制知南京仁宗即位亦特換授是嵗遷龍圖閣直學士知廣州蘓子容罷知制誥知亳州再遇赦遂復此職嘗請别其品秩不報故其謝表云惟麗正圖書之府盛開元禮樂之司在外館之地則為閑正學士之名則已重先朝著令或自二府公台而踐更近例遷官皆由兩省丞郎而兼領又云惟其恩數之優當有官儀之别亦嘗自言於公府豈敢取必於僉諧考異集賢院學士錢若水陳恕郭贄皆自前執政除非獨呉正肅也吕祐之吕文仲李維盛度皆自翰林學士晁逈自翰林學士承旨除非獨劉原甫也李行簡自龍圖閣待制除非獨元厚之也又有自集賢院學士除待制者陳升之李大臨陳繹曽布鄧綰沈括豐稷皆是其除龍圖閣直學士者陳堯咨任布任中師魏瓘吕居簡李東之李參孫長卿吕溱宋敏求皆是亦非獨元厚之也鄧綰自御史中丞得罪元豐元年正月復除待制則是時集賢院學士次於待制矣蘇子容罷知制誥嵗餘㑹恩知婺州亳州入勾當三班院加集賢院學士此云罷知制誥而知亳州再遇赦遂復此職非也國朝講讀官初未有定制太宗始命吕文仲為侍讀繼而加翰林侍讀寓直於御書院文仲官著作佐郎但如其本官班而已真宗初即位楊文莊公徽之為樞宻直學士以老求罷徽之嘗為東宫官乃特置翰林侍讀學士以命之并授文仲夏侯嶠三人又以邢昺為翰林侍講學士始升其班次翰林學士禄賜並與之同設直廬於秘閣侍讀更直侍講長上講讀官自楊文莊等後馮元魯宗道皆以龍圖閣直學士兼侍讀髙若訥以天章閣待制兼侍讀皆不加翰林及學士之名讀官初無定職但従講官入侍而已宋宣獻夏文莊為侍讀學士始請日讀唐書一傳仍㕘釋義理後遂為定制考異馮元魯宗道皆兼侍講此云侍讀非也唐有翰林侍書學士柳公權嘗為之太祖平蜀王著蜀人善書為趙州隆平縣主簿或薦其能書召為衛尉寺丞史館祇候使詳定急就章等後遂以為翰林侍書而不加學士之名盖惜之也自著後不復除人著後官亦不顯有翰林學士王著者自别一人非此人也王君玉琪為館閣校勘晏元獻以前執政留守南京辟為簽書留守判官公事詔特令帶舊職従之館職外除自君玉始神宗初欲為韓魏公神道碑王禹玉為學士宻詔禹玉具故事有無禹玉以唐太宗作魏徴碑髙宗作李勣碑明皇作張説碑徳宗作段秀實碑及本朝太宗作趙普碑仁宗作李用和碑六事以聞於是御製碑賜魏公家或云即禹玉之辭也唐制門下省有𢎞文館中書省有集賢殿書院皆以藏圖書𢎞文館即修文館也武徳初置設生徒使習書選京官五品以上為學士六品以上為直學士及使他官領直館武后垂拱後以宰相兼領館務中宗景龍中置大學士至開元初乾元殿寫四部書置乾元院後改麗正修書院又改集賢直學士等官畧如𢎞文自是宰相皆帶𢎞文集賢大學士遂為故事梁遷都汴貞明中始於右長慶門東北設屋十餘間謂之三館盖昭文集賢史館也初極卑隘太宗太平興國中更命於左昇龍門裏舊車輅院地改作置集賢書於東廡昭文書於西廡史館書於南廡賜名崇文院猶未有秘書省也端拱中始分三館書萬餘卷别為秘閣命李至兼秘書監宋泌兼直閣杜鎬兼校理三館與秘閣始合為一故謂之館閣然皆但有書庫而已元豐官制行遂改為秘書省唐貞觀初始置史館於門下省以他官兼領秩卑者以為直館宰相莅修撰開元中李林甫為監修國史始遷於中書省復置史館修撰迄五代遂為故事本朝乾徳初首以趙韓王監修國史修撰之外復有編修校勘勘書校勘編修隨時創制不一舊但以書庫吏抄録報狀論次其後遂命進奏院及諸司凡詔令等皆闗送開寳後命中書樞宻皆書時政記以授史官淳化中張秘請别置起居院為左右史之職以梁周翰李宗諤為之凡長春崇徳殿宣諭陳列事中書以時政記記之樞宻院則本院記之其餘百司封拜除授沿革制置等事皆悉記録月終送史館而起居郎舍人分直崇政殿别記言動為起居注元豐官制行左右史所書如舊各為㕔於兩後省史館歸之著作局國史院有故則置假左散騎常侍㕔為之而後始以宰相監修梁改樞宻院為崇政院因置直崇政院唐莊宗復舊名遂改為樞宻院直學士至明宗時安重誨為樞宻使明宗既不知書而重誨又武人故孔循始議置端明殿學士二人専備顧問以馮道趙鳯為之班翰林學士上盖樞宻院職事官也本朝樞宻院官既備學士之職浸廢然猶㑹食樞宻使㕔每文徳殿視朝則升殿侍立亦不多除人官制行乃與學士皆為職名為直學士之冠不𨽻樞宻院升殿侍立為樞宻都承旨之任每吏部尚書補外除龍圖閣學士户部以下五曺則除樞宻直學士相呼謂之宻學元昊請和歐公具當時議論有三一曰天下困矣不和則不能支少屈就之可以紓患一曰羌夷險詐雖和而不敢罷兵則與不和無異是空包屈就之羞全無紓患之實一曰自屈志講和之後退而休息練兵訓卒以為後圖三説皆力破之以為不和害少和則害多因言方今不羞屈志急欲就和之人其類有五不忠於陛下者欲急和謂數年以來廟堂勞於斡運邊鄙勞於戎事茍欲避此勤勞自偷目下安逸他時後患任陛下獨當也無識之人欲急和謂和而偷安利在目下和後大患伏而未發也姦邪之人欲急和謂寛陛下以太平無事而望聖心怠於庶事因欲進其邪佞惑亂聰明也疲兵懦將欲急和謂屢敗之軍不知得人則勝但懼賊來常敗也陜西之民欲急和謂其困於調發誅求也五者惟陜西之民可因宣撫使告以朝廷非不欲和而賊未遜順之意其餘可一切不聴使大議不沮而善算有成本朝宰相自建隆元年至元祐四年一百三十年凡五十人自元祐五年至今紹興六年四十六年凡二十八人幾倍於前也故事制科分五等上二等皆虚惟以下三等取人然中選者亦皆第四等獨呉正肅公嘗入第三等後未有繼者至嘉祐中蘇子瞻子由乃始皆入第三等已而子由以言太直為考官胡武平所駮欲黜落復降為第四等設科以來止呉正肅與子瞻入第三等而已故子瞻謝啟云誤占久虚之等官制行内兩省諸㕔照壁自僕射而下皆郭熙畫樹石外尚書省諸㕔照壁自令僕而下皆待詔書周官蘇子容時為吏部侍郎謝幸省進官表云三朝漢省已叨過輦之恩六典周官願謹書屏之戒元豐間三佛齊注輦國入貢請以所貢金蓮花真珠龍腦依其國中法親撒於御座謂之撒殿詔特許之御延和殿引見使跪撒於殿柱外前未有也注輦在廣州南水行約四千里至廣州三佛齊南蠻别種與占城國為鄰國朝三公官未始兼備惟元豐末年文潞公守太尉雍王曺王守司空富鄭公曺濟陽守司徒皆同一時其後宣和間蔡魯公為太師王將明為太傅鄭達夫為太保方相繼兩見元豐三年髙麗入貢有日本國車一乗正使柳洪副使朴寅亮先致意館伴官云諸侯不貢車服誠知非禮但本國欲中朝畧見日本工拙爾詔特許進内香藥庫在謻門外凡二十八庫真宗賜御製七言二韻詩一首為庫額曰每嵗沉檀來逺裔累朝珠玉實皇居今辰内府初開處充牣尤宜史筆書唐正衙宣政殿庭皆植松開成中詔入閣賜對官班退立東階樹下是也殿門外復有藥樹元㣲之詩云松間待制應全逺藥樹監搜可得知自晉魏以來凡入殿奏事官以御史一人立殿門外捜索而後許入謂之監搜御史立藥樹下至唐猶然太和中始罷之考異宣政殿庭東西有四松非皆植松也詔書乃開成元年正月賜對當作次對唐制百官入宫殿門必搜非止為奏事官也藥樹有監搜御史監搜位非泛用御史一人亦非立也太和元年詔今後坐朝衆僚既退宰臣復進奏事其監搜宜停止謂宰臣勿搜非皆罷也髙麗自端拱後不復入貢王徽立嘗誦華嚴經願生中國舊俗以二月望張燈祀天神如中國上元徽一夕夢至京師觀燈若宣召然徧呼國中嘗至京師者問之畧皆夢中所見乃自為詩識之曰宿業因縁近契丹一年朝貢幾多般忽䝉舜日龍輪召便侍堯天佛㑹觀燈熖似蓮丹闕逈月華如水碧雲寒移身幸入華胥境可惜終宵漏滴殘㑹神宗遣海商喻㫖使來朝遂復請修故事余館伴時見初朝張誠一館伴語録所載云爾
