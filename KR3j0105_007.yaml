body:
  text: 石林燕語卷七宋葉夢得撰宇文紹奕考異大中祥符五年玉清昭應宫成王魏公為首相始命充使宫觀置使自此始然每為見任宰相兼職天聖七年吕申公為相時朝廷崇奉之意稍緩因上表請罷使名自是宰相不復兼使康定元年李若谷罷㕘知政事留京師以資政殿大學士為提舉會靈觀事宫觀置提舉自此始自是學士待制知制誥皆得為提舉因以為優閑不任事之職熙寧初先帝患四方士大夫年髙者多疲老不可寄委罷之則傷恩留之則玩政遂仍舊宫觀名而増杭州洞霄及五嶽廟等並依西京崇福宫置管勾或提舉官以知州資序人充不復限以員數故人皆得以自便國朝館伴契丹例用尚書學士元豐初髙麗入貢以畢仲衍館伴仲衍時為中書舎人後遂為故事葢以陪臣處之下契丹一等也契丹館於都亭驛使命往來稱國信使髙麗館於同文館不稱國信其恩數儀制皆殺於契丹大觀中余以中書舎人初差館伴未至而遷學士執政擬改差人上使仍以余為之自是王將明等皆以學士館伴仍升使為國信一切視契丹是時方經營朔方賴以為援也建炎三年余在揚州復入為學士髙麗自海州來朝遂差余館伴余因建言髙麗用學士館伴出於一時之命而升為國信使亦宣和有為為之今風示四夷示以軌物當正前日適然之失盡循舊制因辭疾請命他官於是張達明以中書舎人改差罷國信皆用元豐舊儀自余請之也唐翰林院在銀臺之北乾封以後劉禕之元萬頃之徒時宣召草制其間因名北門學士今學士院在樞密之後腹背相倚不可南向故以其西廊西向為院之正門而後門北向與集英相直因牓曰北門兩省樞密院皆無後門惟學士院有之學士朝退入院與禁中宣命往來皆行此門而正門行者無幾不特取其便事亦以存故事也唐翰林院本内供奉藝能技術雜居之所以詞臣侍書詔其間乃藝能之一爾開元以前猶未有學士之稱或曰翰林待詔或曰翰林供奉如李太白猶稱供奉自張垍為學士始别建學士院于翰林院之南則與翰林院分而為二然猶冒翰林之名葢唐有𢎞文館學士麗正殿學士故此特以翰林别之其後遂以名官訖不可改然院名至今但云學士而不冠以翰林則亦自唐以來沿襲之舊也紫宸垂拱常朝從官於第一重隔門下馬宰相即於第二重隔門下馬自主廊歩入殿門人從皆不許隨雖宰相亦自抱笏而入幕次列於外殿門内兩廡惟中丞以交椅子一隻坐於殿門後稍西北向葢獨坐之意駕坐閤門吏自下以次於幕次簾前報班到二史舎人而上相繼進東西分立於内殿門之外南向閤門内諸司起居畢閤門吏復從上自尚書侍郎以次揖入東西相向對立於殿庭之下然後宰執自幕次徑入就位立定閤門吏復引而北向起居畢宰執升殿尚書以次各隨其班次第相踵從上卷轉而出謂之卷班遇雨則旋傳㫖拜於殿下謂之籠門崇政殿則拜於東廊下太宗時張宏自樞密副使真宗時李惟清自同知樞密院為御史中丞盖重言責也仁宗時亦多命前執政如晏元獻公王安簡公皆是自嘉祐後迄今無為之者故事在京職事官絶少用選人者熙寧初稍欲革去資格之弊於是始詔選舉到可試用人並令崇文院校書以備詢訪差使候二年取㫖或除館職或升資任或只與合入差遣葢欲以觀人材也時邢尚書恕以河南府永安縣主簿首為崇文院校書胡右丞愈知諫院猶以為太遽因請雖選人而未歴外官雖歴任而不滿者皆不得選舉乃特詔恕與堂除近地試銜知縣近嵗不復用此例自始登第直為禁從無害也宰相除授雖兼職故事亦須用麻乾徳二年趙韓王以門下相兼修國史有司失於討論遂止降敇至今不能改考異仁宗實錄云唐制宰相監修國史館殿大學士皆降制本朝自趙普後或止以敇除非故事也此云雖兼職亦用麻泛言兼職非也又若拜相帶監修國史則自降制矣故云或止以敇除言其不皆如此也京城士人舊通用青凉繖祥符五年始詔惟親王得用之餘悉禁六年中書樞密院亦許用然每車駕行幸扈從皆撤去既張繖而席㡌仍舊故謂之重戴餘從官遇出京城門如上池賜宴之類門外皆張繖然須却㡌宼萊公王武恭公皆宋偓壻其夫人明徳皇后親妺也當國主兵皆不以為嫌故事太皇太后繖皆用黄太妃用紅國朝久虚太妃宫元祐間仁宗臨御上元出幸寺觀欽聖太后欽成太妃始皆從行都人謂之三殿蘓子容太妃閣春帖云新春游豫祈民福紅繖雕輿從兩宫慈聖太后在女家時嘗因寒食與家人戯擲錢一錢盤旋乆之遂側立不仆未幾被選故事南郊車駕服通天冠絳紗袍赴青城祀日服靴袍至大次臨祭始更服衮冕元豐中詔定奉祀儀有司建言周官祀昊天上帝則服大裘而冕禮記郊祭之日王被衮以象天王肅援家語臨燔祭脫衮冕葢先衮而後裘因請更製大裘以衮用於祀日大裘用於臨祭議者頗疑家語不可據黜之則周官禮記所載相牴牾時陸右丞佃知禮院乃言古者衣必有裘故緇衣羔裘素衣麑裘黄衣狐裘所謂大裘不裼者止言不裼宜應有襲襲者裏也葢中裘而表衮乃請服大裘被以衮遂為定制大裘黒羔皮為之而縁以黒繒乃唐制也邵興宗初自布衣試茂材異等中選除建康軍節度推官㑹言者論與宰相張鄧公妻黨連姻報罷後因元昊叛詔求方畧之士復獻康定兵說十篇召試秘閣始得權邠州觀察推官祖宗取人之慎葢如是也考異時有密言邵與張鄧公連姻者實非也其後邵進兵說召試授潁州團練推官此云權邠州觀察推官非也盧相多遜素與趙韓王不協韓王為樞密使盧為翰林學士一日偶同奏事上初改元乾徳因言此號從古未有韓王從旁稱賛盧曰此偽蜀時號也帝大驚遽令檢史視之果然遂怒以筆抹韓王面言曰女爭得如他多識韓王經宿不敢洗面翌日奏對帝方命洗去自此隙益深以及於禍多遜朱崖謝表末云班超生入玉門非敢望也子牟心存魏闕何日忘之天下聞而哀焉京師省寺皆南向惟御史臺北向葢自唐以來如此說者以為隋建御史臺取其與尚書省便道相近故唐因之或云御史彈治不法北向取肅殺之義莫知孰是然今臺門上獨設鴟吻亦非他官局所有也國初西蜀初定成都帥例不許將家行蜀土輕剽易為亂中朝士大夫尤以險逺不測為憚張乖崖出守還王元之以詩贈云先皇憂蜀輟樞臣獨冒干戈出劍門萬里辭家堪下淚四年歸闕似還魂弟兄齒序元投分兒女親情又結婚且喜相逢開口笑甘陳功業不須論自慶歴以來天下乂安成都雄富既甲諸帥府復得與家俱行無復曩時之患矣而故事例未有待制為帥者故近嵗自侍郎出守或他帥自待制移帥皆加直學士尤為優除也考異至和元年張安道知益州仁宗特令奉親行竟不敢嘉祐五年吴長文除知成都以親辭改知鄆州云慶歴以來復得與家偕行非也紹聖四年鄭雍以大中大夫知成都葢前執政也政和六年周燾以寳文閣待制知成都此云未有以待制為帥者亦非也神宗初即位猶未見羣臣王樂道韓持國維等以宫僚先入慰於殿西廊既退獨留維問王安石今在甚處維對在金陵上曰朕召之肯來乎維言安石葢有志經世非甘老於山林者若陛下以禮致之安得不來上曰卿可先作書與安石道朕此意行即召矣維曰若是則安石必不來上問何故曰安石平日每欲以道進退若陛下始欲用之而先使人以私書道意安肯遽就然安石子雱見在京師數來臣家臣當自以陛下意語之彼必能達上曰善於是荆公始知上待遇眷屬之意宼萊公初入相王沂公時登第後為濟州通判滿嵗當召試館職萊公猶未識之以問楊文公曰王君何如人文公曰與之亦無素但見其兩賦志業實宏逺因為萊公誦之不遺一字萊公大驚曰有此人乎即召之故事館􅕄皆試於學士院或舎人院是嵗沂公特試於中書考異錢易制科中書試六論謝泌李仲容皆召試中書除直史館李宗諤試相府除校理王禹偁羅處約召試相府除直史館王欽若試學士院除知制誥此云故事皆試於學士院或舎人院非也太祖與符彥卿有舊常推其善用兵知大名十餘年有告謀叛者亟徙之鳯翔而以王晉公祐為代且委以密訪其事戒曰得實吾當以趙普所居命汝面授㫖徑使上道祐到察知其妄數月無所聞驛召面問因力為辯曰臣請以百口保之太祖不樂徙祐知㐮州彥卿竟亦無他祐後創居第於曹門外手植三槐於庭曰吾雖不為趙普後世子孫必有登三公者已而魏公果為太保歐陽文忠作王魏公神道碑畧載此語而國史本傳不書余嘗親見其家子弟言之范侍郎純粹元豐末為陜西轉運判官當五路大舉後財用匱乏屢請於朝吴樞密居厚時為京東都轉運使方以冶鐵皷鑄有寵即上羨餘三百萬緡以佐關輔神宗遂以賜范范得報愀然謂其屬曰吾部雖窘豈忍取此膏血之餘耶力辭訖弗納太平興國五年契丹戎主親領兵數萬犯雄州乘虛遂至髙陽關太宗下詔親征行次大名戎主聞上至亟遁歸未嘗交鋒車駕即凱旋上作詩示行在羣臣有一箭未施戎馬遁六軍空恨陣雲髙之句趙清獻為御史力攻陳恭公范蜀公知諫院獨救之清獻遂併劾蜀公黨宰相懐其私恩蜀公復論御史以隂事誣人是妄加人以死罪請下詔斬之以示天下熙寜初蜀公以時論不合求致仕或欲遂謫之清獻不從或曰彼不嘗欲斬公者耶清獻曰吾方論國事何暇恤私怨方蜀公辯恭公時世固不以為過至清獻之言聞者尤歎服云王武恭公徳用貌竒偉色如深墨當時謂之黒王相公宅在都城西北隅善撫士卒得軍情以其貌異所過閭里皆聚觀蘇儀甫為翰林學士嘗密疏之有宅枕乾崗貌類藝祖之語仁宗為留中不出孔道輔為中丞繼以為言遂罷樞密使知隨州謝賔客雖郡官不與之接在家亦不與家人語如是踰年起知曹州始復語人以為善處謗也狄武㐮起行伍位近臣不肯出其黥文時特以酒濯面使其文顯士卒亦多譽之或云其家數有光怪且姓合䜟書歐陽文忠劉原甫皆屢為之言獨范景仁為諫官人有諷之者景仁謝曰此唐太宗所以殺李君羨上安忍為也然武㐮亦竟出知陳州天聖寳元間范諷與石曼卿皆喜曠達酣飲自肆不復守禮法謂之山東逸黨一時多慕效之龎潁公為開封府判官獨奏諷以為茍不懲治則敗亂風俗將如西晉之季時諷嘗歴御史中丞為龍圖閣學士潁公言之不已遂詔置獄劾之諷坐貶鄂州行軍司馬曼卿時為館閣校勘亦落職通判海州仍下詔戒勵士大夫於是其風遂革丁文簡公度為學士累年以元昊叛仁宗因問用人守資格與擢材能孰先丁言承平無事則守資格緩急有大事大疑則先材能葢自視乆次且時方用兵故不以為嫌孫甫知諫院遽論以為自媒杜祁公時為相孫其客也丁意杜公為辯直而不甚力及杜公罷丁適當制辭云頗彰朋比之風有為而言之也丁自是亦相繼擢樞密副使吕侍讀溱性豪侈簡倨所臨鎮雖監司亦不少降屈知真定李㕘為都轉運使不相能摭其回易庫事㑹有不樂吕者因論以贓歐陽文忠公為翰林學士因率同列上疏論救韓康公時為中丞因言從官有罪從官救之則法無復行矣文忠之言雖不行然士論終以為近厚也國朝親王皆服金帶元豐中官制行上欲寵嘉岐二王乃詔賜方團玉帶著為朝儀先是乘輿玉帶皆排方故以方團别之二王力辭乞寳蔵于家而不服用不許乃請加佩金魚遂詔以玉魚賜之親王玉帶佩玉魚自此始故事玉帶皆不許施於公服然熙寧中收復熙河百官班賀神宗特解所繫帶賜王荆公且使服以入賀荆公力辭乆之不從上待服而後進班不得已受詔次日即釋去大觀中收復青唐以熙河故事復賜蔡魯公而用排方時公已進太師上以為三師禮當異特許施於公服辭乃乞琢為方團既又以為未安或誦韓退之詩有玉帶懸金魚之語告公請因加佩金魚自是何伯通鄭達夫王將明蔡居安童貫非三師而以恩特賜者又五人云學士院正㕔曰玉堂葢道家之名初李肇翰林誌末言居翰苑者皆謂凌玉清遡紫霄豈止於登瀛洲哉亦曰登玉堂焉自是遂以玉堂為學士院之稱而不為榜太宗時蘇易簡為學士上嘗語曰玉堂之設但虚傳其說終未有正名乃以紅羅飛白玉堂之署四字賜之易簡即扃鐍置堂上每學士上事始得一開視最為翰林盛事紹聖間蔡魯公為承㫖始奏乞摹就杭州刻榜揭之以避英廟諱去下二字止曰玉堂云梁莊肅公景祐中監在京倉南郊赦錄朱全忠之後莊肅上疏罷之曰全忠叛臣也何以為勸仁宗善之擢審刑院詳議官記其姓名禁中自是遂見進用考異梁莊肅公以太子中舎監在京廣衍倉景祐中進士及第換中允知淮陽軍論朱全忠事此云監在京倉時疏罷之非也天聖三年錢思公除中書門下平章事錢希白為學士當制希白於思公從父兄也兄草弟麻當時以為盛事建中靖國元年曽子宣自樞府入相子開適草制本朝惟此二人而已考異子宣元符三年十月拜相韓絳相弟維草制此云本朝惟此二人非也祖宗用人多以兩省為要而翰林學士尤號清切由是登二府者十嘗六七杜正獻公以清節名天下然一生多歴外職五為使者徧典諸名藩在内惟為三司户部副使御史中丞知開封府遂至為樞密副使范文正公自諫官被責召還以天章閣待制判國子監遷知開封府復責晚乃自慶州亦入為樞密副使二公皆未嘗歴兩省而文正之文學不更文字之職世尤以為歉也吴龍圖中復性謹約詳於吏治自潭州通判代還孫文懿公為中丞聞其名初不之識即薦為監察御史裏行或問文懿何以不相識而薦之文懿笑曰昔人恥為呈身御史吾豈薦識面臺官耶當時服其公蘓相子容為南京察推時杜祁公尚無恙極器重之每曰子他日名位當與老夫畧同不知以何知之也杜公以六十八嵗入相八十薨蘇公以七十二嵗入相八十二嵗薨不惟爵齒畧相似杜公在位百餘日後以太子少師致仕末乃為太子太師而蘇公在位甫一年後亦以太子少師致仕太上皇即位方進太子太保初杜公告老執政有不悅者故特以東宫三少抑之當時以為非故事而蘇公告老在紹聖初亦坐章申公不悅令具杜公例進呈蘇公聞之喜曰乃吾志也王審琦㣲時與太祖相善後以佐命功尤為親近性不能飲太祖每燕近臣常盡歡而審琦但持空杯太祖意不滿一日酒酣舉杯祝曰審琦布衣之舊方共享富貴酒者天之美祿可惜不令飲之祝畢顧審琦曰大必賜汝酒量可試飲審琦受詔不得已飲輙連數大杯無苦自是每侍燕輙能與衆同飲退還私第則如初楊文公既佯狂逃歸陽翟時祥符六年也中朝士大夫自王魏公而下書問常不輟皆自為文而用其弟倚士曹名奏牘則託之母氏其答王魏公一書末云介推母子絶希緜上之田伯夷弟兄甘守西山之餓當時服其㣲而婉云考異倚往見魏公既歸以書叙感非答其書也王元之初自掖垣謫商州團練副使未幾入為學士至道中復自學士謫守滁州真宗即位以刑部郎中召為知制誥凡再貶還朝不能無怏怏時張丞相齊賢李文定沆當國乃以詩投之曰早有虚名達九重宦途流落漸龍鍾散為郎吏同元稹羞見都人看李邕舊日謬吟紅藥樹新朝曽獻皂囊封猶祈少報君恩了歸卧山林作老農然亦竟坐張齊賢不悅繼有黄州之遷葢雖困而不屈也
