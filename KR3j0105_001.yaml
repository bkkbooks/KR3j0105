body:
  text: 石林燕語卷一宋葉夢得撰宇文紹奕考異太祖皇帝微時嘗被酒入南京髙辛廟香案有竹杯筊因取以占已之名位以一俯一仰為聖筊自小校而上至節度使一一擲之皆不應忽曰過是則為天子乎一擲而得聖筊天命豈不素定矣哉晏元獻為留守題廟中詩所謂庚庚大橫兆謦咳如有聞蓋記是也太祖英武大度初取僭偽諸國皆無甚難之意將伐蜀命建第五百間於右掖門之前下臨汴水曰吾聞孟昶族屬多無使有不足昶既俘即以賜之召李煜入朝復命作禮賢宅於州南略與昶等嘗親幸視役以煜江南嘉山水令大作園池導惠民河水注之會煜稱疾錢俶先請覲即以賜俶二居壯麗制度略侔宮室是時諸國皆如在掌握間矣昶居後為尚書都省俶居至錢思公惟演亦歸有司以為冀公宫錫慶院今太學其故地也考異禮賢宅在京城南錢俶入覲太祖以此館之至太宗初俶納土始賜焉非俶先請覲即賜也錢思公與諸弟乞歸之有司非思公獨請也漢凡王宫皆曰禁中後以元后父名禁遂改禁為省唐以前天子之命通稱詔武后名照遂改詔為制肅代後集賢院有待制之名即漢東方朔之徒所謂待詔金馬門者也京師大內梁氏建國止以為建昌宫本唐宣武節度治所未暇增大也後唐莊宗遷洛復廢以為宣武軍按此句舊本脫武字今據五代會要增正晉天福中因髙祖臨幸更號大寧宮今新城是也其增展外羅城蓋周世宗始為之考異漢制度云帝之下書有四一曰策書二曰制書三曰詔四曰戒敕此云天子之命通稱詔書非也唐永徽中命𢎞文館學士一人日待制於武德殿西門則待制名非始於肅代以後也明皇置翰林院延文章之士至術數之士皆處之謂之待詔即待詔之名初不改也太祖建隆初以大內制度草創乃詔圖洛陽宫殿展皇城東北隅以鐵騎都尉李懷義與中貴人董役按圖營建初命懷義等凡諸門與殿須相望無得輒差故垂拱福寧柔儀清居四殿正重而左石掖與升龍銀臺等諸門皆然惟大慶殿與端門少差爾宫成太祖坐福寧寢殿令闢門前後召近臣入觀諭曰我心端直正如此有少偏曲處汝曺必見之矣羣臣皆再拜後雖嘗經火屢修率不敢易其故處矣太宗即位尊孝章皇后為開寶皇后移居東宫而不建名真宗尊明德太后始名所居殿曰嘉慶後中書門下請為皇太后建宫立名於是詔築宫曰萬安明肅太后既臨朝不築宫止名所居殿曰會慶明肅上仙遺詔進太妃楊氏為皇太后乃名所居為保慶號保慶太后訖治平慈聖宫曰慈夀元祐宣仁宫曰崇慶建中欽聖宫曰慈德皆遵用萬安故事也崇寧初元符太后宫稱崇恩蓋進太后故禮加於開寶云案崇寧初以下原本誤另作一條據文義當合為一今改正崇政殿即舊講武殿惟國忌前一日及軍頭司引見呈試武藝人吏部引改官人即常朝退少頃以衫帽再坐忌前則服淡黃衫皂帶自延和殿出降階由庭中步至不乘輦遇雨然後行西廊皆祖宗之舊也從官獨二史得入侍舊制不甚大崇寧初始徙向後數十步因增舊制發舊基正中得玉斧大七八寸玉色如截肪兩旁碾波濤戲龍文如屈髮制作極工妙余為左史時每見之蓋古殿其下必有寶器為之鎮今乘輿行幸最近駕前所持玉斧是也東華門直北有東向門西與內東門相直俗謂之謻門而無榜張平子東京賦所謂謻門曲榭者也薛綜注謻曲屈斜行依城池為道集韻謻字或作䔟以為宫室相連之稱今循東華門牆而北轉東面為北門亦可謂斜行依牆矣凡宫禁之言相承必皆有自也啓聖禪院太宗降誕之地太平興國中既建為寺以奉太宗神御太祖降誕於西京山子營久失其處真宗朝嘗遣人訪之或以驍勝營旁馬廄隙地有二岡隱起為是復即其地建應天禪院以奉太祖天聖中明肅欲置真宗神御其間而難於遺太宗因以殿後齋宮並置二殿曰三聖殿慶歷中始名太祖殿曰興先太宗曰帝華真宗曰昭考考異昭考當作昭孝瓊林苑金明池宜春苑玉津園謂之四園瓊林苑乾德中置太平興國中復鑿金明池於苑北導金水河水注之以教神衛虎翼水軍習舟楫因為水嬉宜春苑本秦悼王園因以皇城宜春舊苑為富國倉遂遷於此玉津園則五代之舊也今惟瓊林金明最盛嵗以二月開命士庶縱觀謂之開池至上已車駕臨幸畢即閉嵗賜二府從官燕及進士聞喜燕皆在其間金明水戰不復習而諸軍猶為鬼神戲謂之旱教玉津半以種麥每仲夏駕幸觀刈麥自仁宗後亦不復講矣惟契丹賜射為故事宜春俗但稱庶人園以秦王故也荒廢殆不復治祖宗不崇園池之觀前代未有也太祖嘗問趙中令禮何以男子跪拜而婦人不跪趙不能對詢遍禮官皆無知者王貽孫祁公溥之子也為言古詩長跪問故夫即婦人亦跪也則天時婦人始拜而不跪因以太和中張建章渤海國記所載為證趙大賞天聖初明肅太后垂簾欲被衮冕親祠南郊大臣爭莫能得薛簡肅公問即服衮冕陛下當為男子拜乎婦人拜乎議遂格禮九拜雖男子亦不跪貽孫之言蓋陋矣簡肅亦適幸其言偶中使當時有以貽孫所陳密啓者則亦無及矣然天下至今服簡肅之抗論也母后加諡自東漢始本朝后諡初止二字明道中以章獻明肅嘗臨朝特加四字至元豐中慶夀太皇太后上仙章子厚為諡議請於朝詔以太后功德盛大四字猶懼未盡始仍故事遂諡慈聖光獻自是宣仁聖烈與欽聖憲肅皆四字云考異始仍故事當作姑仍故事詔云今以四字為諡大懼未足形容萬一姑循故事而已宜以四字定諡熙寧末年旱詔議改元執政初擬大成神宗曰不可成字於文一人負戈繼又擬豐亨復曰不可亨字為子不成惟豐字可用改元豐范魯公質王祁公溥皆周朝舊相太祖受禪時質年四十四溥四十二在位俱二年質罷八年薨溥二十年薨雍容禪代之際疑間不生雖二人各有賢德然太祖保全大臣亦前代所未有也質性本卞急好面折人過然以廉介自居未嘗營生事四方饋獻皆不納太宗嘗論前宰相以質循規矩慎名器持亷節為稱溥寬厚喜薦導後進罷相時其父尚無恙猶常執子弟之禮不廢貽永尚太宗女乃其子也張伯玉皇祐間為侍御史時陳恭公當國伯玉首言天下未治未得真相故也由是忤恭公仁宗時眷恭公厚不得已出伯玉知太平州然亦惜其去密使小黃門諭旨勞之曰聞卿貧無慮朕當為卿治裝翌日中旨三司賜錢五萬恭公猶執以為無例上曰吾業已許之矣卒賜之祖宗愛惜財用如此又見所以奬勵言官之意也明肅太后上徽號初欲御天安殿即今大慶殿也王沂公爭之乃改御文德殿元祐初宣仁太后受册有司援文德故事為請宣仁不許令學士院降詔蘇子瞻當制頗斥天聖之制猶以御文德為非是既進本宣仁批出曰如此是彰先姑之失可别作一意但言吾德薄不敢比方前人聞者無不畏服是嵗册禮止御崇政殿考異按子瞻草詔云矧豫涼薄常慕謙虛豈敢躬御治朝自同先后處之無過之地乃是愛君之深內批常慕字以下二十六字旨意稍涉今是不免有昔非之議可敘述太皇太后碩德實不及章獻不敢必依章獻御文德殿故事宜三省改此意進入韓魏公為英宗山陵使是時兩宫嘗為近侍姦人所間一日侵夜忽有中使持簾帷御封至魏公持之久不發忽自起赴燭焚之使者驚懇曰有事當别論奏安可輒焚御筆公曰此某事非使人之罪也歸但以此奏知卒焚之有頃外傳有中使再至公亟出迎問故曰得旨追前使人取御封公曰不發焚之矣二使歸報慈聖太后歎息曰韓琦終見事逺有斷考異英宗當作仁宗大遼國信書式前稱月日大宋皇帝謹致書於大遼國徽號皇帝闕下入辭次具使副全銜稱今差某官充某事國信使副有少禮物具諸别幅奉書陳賀不宣謹白其辭率不過八句回書其前式同後具所來使銜稱今某官等回専奉書陳謝不宣謹白不具副使銜辭亦不過八句元祐間宣仁太后臨朝别遣太后使副以皇帝書達意式皆如前但云今差某官充太皇太后某使爾賀書亦如之元祐垂簾呂司空晦叔當國元日欲率羣臣以天聖故事請太后同御殿行慶會稱賀之禮宣仁謙避不從止令候皇帝御殿禮畢百官內東門拜表而已蘇子容當制作手詔云顧惟菲涼豈敢比隆於先后其在典法亦當幾合於前規是嵗進春帖子其一篇云上夀春朝近外廷詔恩不許會公卿即時二史書謙德只使羣官進姓名國朝典禮初循用唐開元禮舊書一百五十卷太祖開寶中始命劉溫叟盧多遜扈蒙三人補緝遺逸通以今事為開寶通禮二百卷又義纂一百卷以發明其旨且依開元禮設科取士嘉祐初歐陽文忠公知太常禮院復請續編以姚闢蘇洵掌其事為太常因革禮一百卷議者病其太簡元豐中蘇子容復議以開寶通禮及近嵗詳定禮文分有司儀注沿革為三門為元豐新禮不及行至大觀中始修之鄭達夫主其事然時無知禮舊人書成頗多抵牾後亦廢士大夫家廟自唐以後不復講慶歷元年郊祀赦聽文武官皆立廟然朝廷未嘗討論立為制度無所遵守故久之不克行皇祐二年初祀明堂宋莒公為相乃始請下禮官定議於是請平章事以上立四廟東宫少保以上立三廟而其詳皆不盡見文潞公為平章事首請立廟於洛終無所考據不敢輕作至和初知長安因得唐杜佑舊廟於曲江猶是當時舊制一堂四室旁為兩翼嘉祐初遂倣為之兩廡之前又加以門以其東廡藏祭器西廡藏家牒祊在中門之右省牲展饌滌濯等在中門之左别為外門置庖厨於中門外之東南堂中分四室用晉荀安昌公故事作神板而不為主唐周元陽祀録以元日寒食秋分冬夏至為四時祭之節前祭皆一日致齋在洛則以是祭或在他處則奉神板自隨倣古諸侯載遷主之義公元豐間始致仕歸洛前此在洛無幾則廟不免猶虛設乃知古今異制終不可盡行也父沒稱皇考於禮本無見王制言天子五廟曰考廟王考廟皇考廟顯考廟祖考廟則皇考者曽祖之稱也自屈原離騷稱朕皇考曰伯庸則以皇考為父故晉司馬機為燕王告祔廟文稱敢昭告于皇考清惠亭侯後世遂因不改漢議宣帝父稱蔡義初請諡為悼曰悼太子魏相以為宜稱尊號曰皇考則皇考乃尊號之稱非後世所得通用然沿習已久雖儒者亦不能自異也考異曲禮祭父曰皇考此云父沒稱皇考於禮本無見非也治平中議濮安懿王稱號學士王禹玉中丞呂獻可諫官范景仁司馬君實等皆謂宜稱皇伯此固顯然不可歐陽永叔為參政尤詆之五代史書追尊皇伯宗儒為宋州刺史所以深著其説然遂欲稱考則不免有兩統二父之嫌故議者紛然久不決慈聖光獻太后內出手詔令稱親當時言官亦力爭而止以諸侯入繼古未有也自漢宣帝以來始見之魏相以為宜稱皇考此固亡乎禮之禮而哀帝稱定陶王為恭皇安帝稱清河王為孝德皇則甚矣禮以王以皇以顯冠考猶是尊稱若舉諡而加皇乃帝號既不足辨父子子而爵父此正禮之所禁也曽子固嘗著議以為父沒之通稱施於為人後之義為無嫌此蓋附永叔之意當時羣議既不決故仍舊但稱濮安懿王蓋難之也考異時吕獻可為御史知雜范景仁為翰林學士此云呂中丞范諫官非也曾子固謂皇考一名而為説有三如禮之皇考則曾祖也漢宣帝父稱尊號曰皇考則加考以皇號也屈原稱皇考曰伯庸之類則父沒之通稱也且言有可有不可者其剖析甚詳而以悼園稱皇立廟為非今二説中専舉其父沒之通稱之一句以為附永叔之意亦未盡也若謂皇乃帝號則或曰皇考或舉諡而加皇茍以為不可則一也豈得執一以為亡禮乎既以濮議稱皇伯為顯然不可又以稱考為有兩統二父之嫌然則當何稱乎歐陽公嘗辨二父則有之而非兩統也然則兩統或可以言嫌而二父亦謂之嫌非也皇祐治平天下財賦嵗入皆一億萬以上嵗費亦一億萬以上出入略相當景德官一萬餘員皇祐治平加二萬餘員景德郊費六百萬皇祐治平加一千萬以上二者皆倍於景德元豐中曾子固嘗請欲推考所從來悉為裁損使嵗入如皇祐治平而祿吏奉郊之費同景德止二者所省已半以類推之嵗入以億萬為率嵗但省三之一則三十年當有九億萬遂可以為十五年之蓄議格不行此雖論其大約未必盡然要之言節用似當略倣此可以得實效愈於毛舉自前瑣碎徒為裁減之名而訖不能行也仁宗慶歷初嘗詔儒臣檢討唐故事日進五條數諭近臣以為有補其後久廢元祐間蘇子容為承旨在經筵復請如故事史官學士採新舊唐書諸帝所行及羣臣獻納日進數事因詔講讀官遇不講日各進漢唐故實二事子容仍於逐事後略論得失大旨當時遂以為例濮議廷臣既皆欲止稱皇伯歐陽文忠力詆以為不然因引儀禮及五服敕云為人後者為其父母服則是雖出繼而其本生猶稱父母也是以漢宣帝光武皆尊其父稱皇考時未有難之者惟司馬君實在諌院獨疏之云為人後而言父母此因服立文捨父母則無以為稱非謂其得稱父母也此殆政府欲欺罔天下之人以為皆不識文理若宣帝承昭帝之後以孫繼祖則無嫌故可尊其父為皇考而不敢尊其祖為皇祖光武起布衣雖名中興與創業同使自立七廟猶不為過况但止稱皇考今上為仁宗子而稱濮王為皇考則置仁宗何地乎文忠得此亦無以奪之謂稱皇伯不然君實雖辨之力然無據依亦終不能奪文忠也考異按兩制等議謂禮律為父母報云者勢當然不可云為叔伯報也趙大觀又引去婦出母為證則當時論難非獨溫公而此云未有能難之者惟司馬君實云云非也既云文忠得此亦無以奪之又云君實終不能奪文忠也則二者孰是况二公各持其論終未嘗少屈乎故事宰相食邑滿萬户始開國賈文元罷相知北京未滿萬户以出師佐平貝州功特封安國公其後以武勝軍節度使入為祥源觀使留京師請還節仁宗特置觀文殿大學士寵之觀文有大學士自文元始蘇子容挽辭所謂大邦開國賞元勳祕殿升班寵舊臣是也故事臺官皆御史中丞知雜與翰林學士互舉其資任須中行員外郎以下太常博士以上曾任通判人未歷通判非特旨不薦仍為裏行此唐馬周故事也議者頗病太拘難於應格熙寧初司馬君實為中司已請稍變舊制及呂晦叔繼為中司遂薦張戩王子韶二人皆京官也既而王荆公驟用李資深以秀州軍事判官特除太子中允權監察御史裏行命下宋次道當制封還詞頭已而次命李才元蘇子容皆不奉詔蓋謂旋除中允而命猶自選人而除也三人皆謫卒用資深近嵗有差遣合用京官特改官而除者自資深始也國朝經筵講讀官舊皆坐乾興後始立蓋仁宗時年尚幼坐讀不相聞故起立欲其近爾後遂為故事熙寧初吕申公王荆公為翰林學士吳沖卿知諫院皆兼侍講始建議以為六經言先王之道講者當賜坐因請復行故事下太常禮院詳定當時韓持國刁景純胡宇夫為判院是申公等言蘇子容龔鼎臣周孟陽及禮官王汾劉攽韓忠彥以為講讀官曰侍蓋侍天子非師道也且講讀官一等侍讀仍班侍講上今侍講坐而侍讀立不應為二申公等議遂格今講讀官初入皆坐賜茶唯當講官起就案立講畢復就坐賜湯而退侍讀亦如之蓋乾興之制也邢昺自翰林侍講學士以工部尚書知曺州仍舊職翰林侍講學士外除自昺始張文節公知白求罷參知政事以刑部侍郎充翰林侍讀學士知天雄軍翰林侍讀學士外除自知白始昺班翰林學士上從其官也
